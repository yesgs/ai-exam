<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 竞技场</title>
<style>
:root {
  --bg: #0a0e14;
  --surface: #141b22;
  --surface2: #1c2430;
  --border: #2a3545;
  --text: #c8d6e5;
  --text-dim: #6b7d95;
  --accent: #4cd964;
  --accent2: #ff6b35;
  --gold: #ffd700;
  --silver: #c0c0c0;
  --bronze: #cd7f32;
  --glm: #5c7cfa;
  --gpt: #10a37f;
  --ds: #6c5ce7;
  --kimi: #ff6b9d;
  --mm: #ff9500;
  --mimo: #00bcd4;
  --qwen: #7c3aed;
  --radius: 14px;
  --radius-sm: 8px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── Header ── */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
  z-index: 10;
}

.logo {
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -.5px;
  display: flex;
  align-items: center;
  gap: 10px;
  white-space: nowrap;
}
.logo .icon { font-size: 28px; }
.logo span { background: linear-gradient(135deg, var(--accent), #34c759); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

/* Project tabs */
.project-tabs {
  display: flex;
  gap: 4px;
  background: var(--surface2);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  padding: 3px;
}

.project-tab {
  padding: 6px 16px;
  font-size: 13px;
  font-weight: 600;
  border: none;
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
  font-family: inherit;
  border-radius: 6px;
}
.project-tab:hover { color: var(--text); background: rgba(255,255,255,.04); }
.project-tab.active { color: #fff; background: rgba(255,255,255,.1); }

/* Controls */
.controls {
  display: flex;
  align-items: center;
  gap: 8px;
  flex: 1;
  flex-wrap: wrap;
}

.btn-group {
  display: flex;
  background: var(--surface2);
  border-radius: var(--radius-sm);
  overflow: hidden;
  border: 1px solid var(--border);
}

.btn {
  padding: 7px 14px;
  font-size: 13px;
  font-weight: 600;
  border: none;
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
  font-family: inherit;
}
.btn:hover { color: var(--text); background: rgba(255,255,255,.04); }
.btn.active { color: #fff; background: rgba(255,255,255,.1); }

.btn-action {
  padding: 7px 16px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  font-family: inherit;
  transition: all .15s;
  white-space: nowrap;
}
.btn-action:hover { border-color: var(--accent); color: var(--accent); }
.btn-action.danger:hover { border-color: #ff4757; color: #ff4757; }

/* Model tag filter */
.model-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-left: 8px;
}

.model-tag {
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  border: 1.5px solid transparent;
  transition: all .2s;
  user-select: none;
  background: var(--surface2);
  color: var(--text-dim);
  font-family: inherit;
}
.model-tag.active { color: #fff; border-color: currentColor; }
.model-tag.glm { color: var(--glm); border-color: transparent; }
.model-tag.glm.active { background: rgba(92,124,250,.15); border-color: var(--glm); }
.model-tag.gpt { color: var(--gpt); border-color: transparent; }
.model-tag.gpt.active { background: rgba(16,163,127,.15); border-color: var(--gpt); }
.model-tag.ds { color: var(--ds); border-color: transparent; }
.model-tag.ds.active { background: rgba(108,92,231,.15); border-color: var(--ds); }
.model-tag.kimi { color: var(--kimi); border-color: transparent; }
.model-tag.kimi.active { background: rgba(255,107,157,.15); border-color: var(--kimi); }
.model-tag.mm { color: var(--mm); border-color: transparent; }
.model-tag.mm.active { background: rgba(255,149,0,.15); border-color: var(--mm); }
.model-tag.mimo { color: var(--mimo); border-color: transparent; }
.model-tag.mimo.active { background: rgba(0,188,212,.15); border-color: var(--mimo); }
.model-tag.qwen { color: var(--qwen); border-color: transparent; }
.model-tag.qwen.active { background: rgba(124,58,237,.15); border-color: var(--qwen); }

/* ── Main Grid ── */
main {
  flex: 1;
  overflow: auto;
  padding: 12px;
  display: grid;
  gap: 10px;
  background: var(--bg);
}

/* Layout modes */
main.layout-2 { grid-template-columns: 1fr 1fr; }
main.layout-3 { grid-template-columns: 1fr 1fr 1fr; }
main.layout-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }
main.layout-ab { grid-template-columns: 1fr 1fr; }
main.layout-focus { grid-template-columns: 1fr; }

/* ── Card ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  position: relative;
  transition: all .3s cubic-bezier(.4,0,.2,1);
  min-height: 300px;
}

.card.focused {
  border-color: var(--accent);
  box-shadow: 0 0 30px rgba(76,217,100,.15);
}

.card.dimmed {
  opacity: .35;
  filter: grayscale(.4);
}

.card-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  gap: 8px;
}

.card-name {
  font-weight: 700;
  font-size: 13px;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 6px;
}

.card-color-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

.card-actions {
  display: flex;
  gap: 4px;
  flex-shrink: 0;
}

.card-btn {
  padding: 4px 10px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 11px;
  font-weight: 600;
  transition: all .15s;
  font-family: inherit;
}
.card-btn:hover { border-color: var(--accent); color: var(--accent); }

.card-iframe-wrap {
  flex: 1;
  position: relative;
  background: #000;
  min-height: 250px;
}

.card-iframe-wrap iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}

/* Loading overlay */
.loading-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--surface);
  z-index: 2;
  transition: opacity .3s;
  pointer-events: none;
}

.loading-overlay.hidden {
  opacity: 0;
  pointer-events: none;
}

.spinner {
  width: 32px;
  height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Loading state for whole page */
.page-loading {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 16px;
  color: var(--text-dim);
  font-size: 16px;
}
.page-loading .spinner { width: 48px; height: 48px; border-width: 4px; }

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  padding: 12px 24px;
  border-radius: 24px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 13px;
  font-weight: 600;
  z-index: 50;
  opacity: 0;
  transition: opacity .3s;
  pointer-events: none;
}
.toast.show { opacity: 1; }

/* ── Responsive ── */
@media (max-width: 900px) {
  main.layout-3, main.layout-4 { grid-template-columns: 1fr 1fr; }
  header { flex-wrap: wrap; }
  .model-tags { display: none; }
}
@media (max-width: 600px) {
  main.layout-2, main.layout-3, main.layout-4, main.layout-ab { grid-template-columns: 1fr; }
}

/* ── Animations ── */
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(76,217,100,.4); }
  50% { box-shadow: 0 0 0 8px rgba(76,217,100,0); }
}
.card.just-focused {
  animation: pulse .6s ease-out;
}
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">
    <span class="icon">🏟️</span>
    <span>AI 竞技场</span>
  </div>
  <div class="project-tabs" id="projectTabs"></div>
  <div class="controls">
    <span style="font-size:11px;color:var(--text-dim);margin-right:4px;">布局</span>
    <div class="btn-group" id="layoutGroup">
      <button class="btn active" data-layout="ab">A/B</button>
      <button class="btn" data-layout="2">2列</button>
      <button class="btn" data-layout="3">3列</button>
      <button class="btn" data-layout="4">4列</button>
      <button class="btn" data-layout="focus">焦点</button>
    </div>
    <span style="font-size:11px;color:var(--text-dim);margin-left:12px;">模型</span>
    <div class="model-tags" id="modelTags"></div>
  </div>
  <button class="btn-action" onclick="window.location.reload()" title="刷新所有">🔄 刷新</button>
</header>

<!-- Main Grid -->
<main id="grid" class="layout-2">
  <div class="page-loading" id="pageLoading">
    <div class="spinner"></div>
    <span>加载项目中...</span>
  </div>
</main>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── Model metadata (color, display name) ──
const MODEL_META = {
  'glm-5.1':      { name: 'GLM 5.1',       family: 'glm',  color: '#5c7cfa' },
  'glm-5.2':      { name: 'GLM 5.2',       family: 'glm',  color: '#5c7cfa' },
  'gpt-5.5':      { name: 'GPT 5.5',       family: 'gpt',  color: '#10a37f' },
  'deepseek-4-pro':{ name: 'DeepSeek V4',   family: 'ds',   color: '#6c5ce7' },
  'minimax-3':     { name: 'MiniMax 3',     family: 'mm',   color: '#ff9500' },
  'kimi-2.6':      { name: 'Kimi 2.6',      family: 'kimi', color: '#ff6b9d' },
  'mimo-2.5-pro':  { name: 'MiMo 2.5 Pro',  family: 'mimo', color: '#00bcd4' },
  'qwen-3.7':      { name: 'Qwen 3.7',      family: 'qwen', color: '#7c3aed' },
};

function getModelMeta(id) {
  return MODEL_META[id] || {
    name: id.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase()),
    family: 'other',
    color: '#8e99a4',
  };
}

// ── State ──
const state = {
  projects: [],
  currentProjectId: null,
  layout: 'ab',
  focusId: null,
  activeModels: new Set(),
};

// ── DOM refs ──
const grid = document.getElementById('grid');
const toast = document.getElementById('toast');
const pageLoading = document.getElementById('pageLoading');

// ── Toast ──
let toastTimer;
function showToast(msg) {
  clearTimeout(toastTimer);
  toast.textContent = msg;
  toast.classList.add('show');
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
}

// ── Get current models for selected project ──
function getCurrentModels() {
  const project = state.projects.find(p => p.id === state.currentProjectId);
  if (!project) return [];
  return project.models.map(m => {
    const meta = getModelMeta(m.id);
    return {
      id: m.id,
      name: meta.name,
      family: meta.family,
      color: meta.color,
      path: `/project/${project.id}/${m.id}/${m.htmlFile}`,
    };
  });
}

// ── Build project tabs ──
function buildProjectTabs() {
  const tabs = document.getElementById('projectTabs');
  tabs.innerHTML = '';
  state.projects.forEach(p => {
    const tab = document.createElement('button');
    tab.className = `project-tab${p.id === state.currentProjectId ? ' active' : ''}`;
    tab.textContent = p.name;
    tab.onclick = () => {
      if (p.id === state.currentProjectId) return;
      state.currentProjectId = p.id;
      state.focusId = null;
      state.activeModels = new Set(p.models.slice(0, 2).map(m => m.id));
      // Reset layout to ab when switching project
      state.layout = 'ab';
      document.querySelectorAll('#layoutGroup .btn').forEach(b => b.classList.remove('active'));
      document.querySelector('#layoutGroup .btn[data-layout="ab"]').classList.add('active');
      buildProjectTabs();
      render();
    };
    tabs.appendChild(tab);
  });
}

// ── Build model tags ──
const modelTagsEl = document.getElementById('modelTags');
function buildModelTags() {
  modelTagsEl.innerHTML = '';
  const models = getCurrentModels();
  models.forEach(m => {
    const tag = document.createElement('button');
    tag.className = `model-tag ${m.family}${state.activeModels.has(m.id) ? ' active' : ''}`;
    tag.textContent = m.name;
    tag.onclick = () => {
      if (state.activeModels.has(m.id)) {
        if (state.activeModels.size <= 1) return showToast('至少保留一个模型');
        state.activeModels.delete(m.id);
      } else {
        state.activeModels.add(m.id);
      }
      state.focusId = null;
      render();
    };
    modelTagsEl.appendChild(tag);
  });
}

// ── Layout buttons ──
document.querySelectorAll('#layoutGroup .btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#layoutGroup .btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.layout = btn.dataset.layout;
    state.focusId = null;
    render();
  });
});

// ── Render ──
function render() {
  const allModels = getCurrentModels();
  const activeList = allModels.filter(m => state.activeModels.has(m.id));
  let displayList = activeList;

  if (state.layout === 'focus' && state.focusId) {
    displayList = activeList.filter(m => m.id === state.focusId);
  } else if (state.layout === 'ab') {
    displayList = activeList.slice(0, 2);
  }

  grid.className = `layout-${state.layout}`;

  buildModelTags();

  // Reuse existing cards only if iframe src matches current project
  const existingCards = {};
  grid.querySelectorAll('.card').forEach(c => {
    existingCards[c.dataset.modelId] = c;
  });

  grid.innerHTML = '';

  displayList.forEach(model => {
    const existing = existingCards[model.id];
    if (existing) {
      const iframe = existing.querySelector('iframe');
      if (iframe && iframe.getAttribute('src') === model.path) {
        grid.appendChild(existing);
        updateCardBar(existing, model);
      } else {
        // Project changed — src mismatch, recreate card
        const card = createCard(model);
        grid.appendChild(card);
      }
    } else {
      const card = createCard(model);
      grid.appendChild(card);
    }
  });

  // Focus mode: if nothing selected, show first
  if (state.layout === 'focus' && !state.focusId && activeList.length > 0) {
    state.focusId = activeList[0].id;
    render();
  }
}

function updateCardBar(card, model) {
  const nameSpan = card.querySelector('.card-name span');
  nameSpan.textContent = model.name;
  const dot = card.querySelector('.card-color-dot');
  if (dot) dot.style.background = model.color;
}

function createCard(model) {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.modelId = model.id;
  if (state.focusId === model.id) {
    card.classList.add('focused', 'just-focused');
    setTimeout(() => card.classList.remove('just-focused'), 700);
  }
  if (state.focusId && state.focusId !== model.id) {
    card.classList.add('dimmed');
  }

  card.innerHTML = `
    <div class="card-bar">
      <div class="card-name">
        <span class="card-color-dot" style="background:${model.color}"></span>
        <span>${model.name}</span>
      </div>
      <div class="card-actions">
        <button class="card-btn focus-btn" title="焦点模式">🔍 聚焦</button>
        <button class="card-btn reload-btn" title="重新加载">🔄</button>
        <button class="card-btn open-btn" title="新窗口打开">↗</button>
      </div>
    </div>
    <div class="card-iframe-wrap">
      <div class="loading-overlay"><div class="spinner"></div></div>
      <iframe src="${model.path}" allow="accelerometer; autoplay; clipboard-write" loading="lazy"></iframe>
    </div>
  `;

  const iframe = card.querySelector('iframe');
  const loadingOverlay = card.querySelector('.loading-overlay');

  iframe.addEventListener('load', () => {
    loadingOverlay.classList.add('hidden');
  });

  // Click on card to focus
  card.addEventListener('click', (e) => {
    if (e.target.closest('.card-btn')) return;

    if (state.layout === 'focus') {
      const activeList = getCurrentModels().filter(m => state.activeModels.has(m.id));
      const curIdx = activeList.findIndex(m => m.id === state.focusId);
      state.focusId = activeList[(curIdx + 1) % activeList.length].id;
    } else {
      state.focusId = model.id;
      state.layout = 'focus';
      document.querySelectorAll('#layoutGroup .btn').forEach(b => b.classList.remove('active'));
      document.querySelector('#layoutGroup .btn[data-layout="focus"]').classList.add('active');
    }
    render();
  });

  // Focus button
  card.querySelector('.focus-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    state.focusId = model.id;
    state.layout = 'focus';
    document.querySelectorAll('#layoutGroup .btn').forEach(b => b.classList.remove('active'));
    document.querySelector('#layoutGroup .btn[data-layout="focus"]').classList.add('active');
    render();
  });

  // Reload button
  card.querySelector('.reload-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    iframe.src = '';
    loadingOverlay.classList.remove('hidden');
    setTimeout(() => { iframe.src = model.path; }, 100);
  });

  // Open in new window
  card.querySelector('.open-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    window.open(model.path, '_blank');
  });

  return card;
}

// ── Keyboard shortcuts ──
document.addEventListener('keydown', (e) => {
  if (e.ctrlKey || e.metaKey) {
    const layoutMap = { '1':'focus', '2':'ab', '3':'2', '4':'3', '5':'4' };
    const layout = layoutMap[e.key];
    if (layout) {
      e.preventDefault();
      state.layout = layout;
      document.querySelectorAll('#layoutGroup .btn').forEach(b => b.classList.remove('active'));
      document.querySelector(`#layoutGroup .btn[data-layout="${layout}"]`).classList.add('active');
      if (layout !== 'focus') state.focusId = null;
      render();
    }
  }

  if (e.key === 'Escape' && state.layout === 'focus') {
    state.layout = 'ab';
    state.focusId = null;
    document.querySelectorAll('#layoutGroup .btn').forEach(b => b.classList.remove('active'));
    document.querySelector('#layoutGroup .btn[data-layout="ab"]').classList.add('active');
    render();
  }

  if (state.layout === 'focus' && (e.key === 'ArrowLeft' || e.key === 'ArrowRight')) {
    e.preventDefault();
    const activeList = getCurrentModels().filter(m => state.activeModels.has(m.id));
    const curIdx = activeList.findIndex(m => m.id === state.focusId);
    const dir = e.key === 'ArrowRight' ? 1 : -1;
    const nextIdx = (curIdx + dir + activeList.length) % activeList.length;
    state.focusId = activeList[nextIdx].id;
    render();
  }
});

// ── Init: load projects from API ──
async function init() {
  try {
    const res = await fetch('/api/projects');
    const projects = await res.json();

    if (!projects.length) {
      grid.innerHTML = '<div class="page-loading"><span>未找到任何项目</span></div>';
      return;
    }

    state.projects = projects;
    state.currentProjectId = projects[0].id;
    state.activeModels = new Set(projects[0].models.slice(0, 2).map(m => m.id));

    buildProjectTabs();
    render();
  } catch (err) {
    console.error('Failed to load projects:', err);
    grid.innerHTML = '<div class="page-loading"><span>加载失败，请确认服务器已启动</span></div>';
  }
}

init();

console.log('🏟️ AI 竞技场已就绪');
console.log('   快捷键: Ctrl+1~5 切换布局 | ← → 切换模型 | Esc 退出焦点');
</script>

</body>
</html>
