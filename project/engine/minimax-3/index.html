<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>四冲程活塞发动机剖面动画</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
    font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    color: #e2e8f0;
    overflow: hidden;
  }
  .wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100%;
    padding: 10px 0;
    box-sizing: border-box;
  }
  h1 {
    margin: 6px 0 4px;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 1px;
    color: #f1f5f9;
  }
  .stage {
    position: relative;
    width: 640px;
    height: 620px;
    background: radial-gradient(ellipse at center, #1e293b 0%, #0f172a 100%);
    border: 1px solid #334155;
    border-radius: 10px;
    overflow: hidden;
  }
  canvas {
    display: block;
    margin: 0 auto;
  }
  .info {
    margin-top: 8px;
    width: 640px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
  }
  .phase {
    padding: 4px 12px;
    border-radius: 14px;
    background: #1e293b;
    border: 1px solid #334155;
    color: #cbd5e1;
    min-width: 90px;
    text-align: center;
  }
  .phase.active {
    background: #2563eb;
    color: #fff;
    border-color: #3b82f6;
  }
  .legend {
    display: flex;
    gap: 12px;
    font-size: 12px;
  }
  .dot {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    margin-right: 4px;
    vertical-align: middle;
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>四冲程活塞发动机 · 剖面图动画</h1>
  <div class="stage">
    <canvas id="engine" width="640" height="600"></canvas>
  </div>
  <div class="info">
    <div class="legend">
      <span><span class="dot" style="background:#38bdf8"></span>进气 (空气)</span>
      <span><span class="dot" style="background:#f59e0b"></span>燃烧 (火焰)</span>
      <span><span class="dot" style="background:#94a3b8"></span>排气 (废气)</span>
    </div>
    <div class="phase" id="phaseLabel">循环中...</div>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('engine');
  const ctx = canvas.getContext('2d');
  const W = canvas.width;
  const H = canvas.height;

  // === Geometry constants ===
  const CYL_LEFT = 240;             // left edge of cylinder
  const CYL_RIGHT = 400;            // right edge of cylinder
  const CYL_WIDTH = CYL_RIGHT - CYL_LEFT;
  const CYL_TOP = 60;               // top of cylinder head
  const CYL_BOTTOM = 380;           // bottom of cylinder (where piston reaches max down)
  const CYL_HEIGHT = CYL_BOTTOM - CYL_TOP;

  // Piston dimensions
  const PISTON_W = 150;
  const PISTON_H = 36;

  // Crank
  const CRANK_CX = 320;             // crank center x
  const CRANK_CY = 460;             // crank center y
  const CRANK_R = 60;               // crank radius
  const ROD_LEN = 160;              // connecting rod length

  // Intak/exhaust ports
  const INTAKE_X = 270;             // intake port center x
  const INTAKE_Y = CYL_TOP;         // intake enters from top-left
  const EXHAUST_X = 370;            // exhaust port center x
  const EXHAUST_Y = CYL_TOP;        // exhaust exits top-right

  // === Animation state ===
  let angle = 0;                    // crank angle in radians
  const TWO_PI = Math.PI * 2;
  const CYCLE_DURATION = 8000;      // ms for full 4-stroke cycle (720°)
  let lastT = performance.now();

  // Particles for air intake (blue) and exhaust (gray)
  const particles = [];

  function spawnParticle(x, y, vx, vy, color, life, size) {
    particles.push({ x, y, vx, vy, color, life, age: 0, size });
  }

  // Piston Y from crank angle, with proper connecting rod geometry
  function pistonY(theta) {
    // crank pin position (relative to crank center)
    const pinX = CRANK_CX + CRANK_R * Math.sin(theta);
    const pinY = CRANK_CY + CRANK_R * Math.cos(theta);
    // distance from pin to piston wrist pin (which is at CYL_LEFT + PISTON_W/2 horizontally)
    const wristX = CRANK_CX;
    const dx = wristX - pinX;
    const dy2 = ROD_LEN * ROD_LEN - dx * dx;
    const wristY = pinY - Math.sqrt(Math.max(0, dy2));
    return wristY;
  }

  function getPhase(theta) {
    // Normalize theta to [0, 2π) — two full crank revolutions = 4 strokes
    // Stroke mapping (in radians):
    //   0          .. π/2  : intake (piston goes down)
    //   π/2        .. π    : intake bottom -> TDC
    //   π          .. 3π/2 : compression (piston goes up)
    //   3π/2       .. 2π   : power begins
    //   2π         .. 5π/2 : power (piston goes down)
    //   5π/2       .. 3π   : exhaust begins
    //   3π         .. 7π/2 : exhaust (piston goes up)
    //   7π/2       .. 4π   : cycle end
    const t = ((theta % TWO_PI) + TWO_PI) % TWO_PI;
    if (t < Math.PI) return 'intake';
    if (t < Math.PI * 1.5) return 'compression';
    if (t < Math.PI * 2) return 'powerIgnite'; // ignition at TDC
    // We need two revolutions; let's use the modular approach for full 720°:
    // better: just use mod 4π with 4 equal sectors
    // Reset using extended angle
    return 'power';
  }

  // Better: use extended angle mod 4π
  function getPhase4(theta) {
    // Normalize to [0, 4π)
    const t = ((theta % (TWO_PI * 2)) + (TWO_PI * 2)) % (TWO_PI * 2);
    if (t < Math.PI) return 'intake';            // 0° - 180°
    if (t < TWO_PI) return 'compression';        // 180° - 360°
    if (t < Math.PI * 3) return 'power';         // 360° - 540°
    return 'exhaust';                             // 540° - 720°
  }

  // Cylinder fill color & state per phase
  const PHASE_INFO = {
    intake:    { label: '1. 进气冲程',  intakeOpen: true,  exhaustOpen: false, ignition: false },
    compression:{ label: '2. 压缩冲程', intakeOpen: false, exhaustOpen: false, ignition: false },
    power:     { label: '3. 动力冲程',  intakeOpen: false, exhaustOpen: false, ignition: true  },
    exhaust:   { label: '4. 排气冲程',  intakeOpen: false, exhaustOpen: true,  ignition: false }
  };

  // Smooth crank angular velocity
  function step(now) {
    const dt = (now - lastT) / 1000;
    lastT = now;
    angle += (TWO_PI * 2) / (CYCLE_DURATION / 1000) * dt;
    if (angle > TWO_PI * 2) angle -= TWO_PI * 2;
    draw();
    requestAnimationFrame(step);
  }

  // === Drawing helpers ===
  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  function drawCylinderWalls() {
    // Outer engine block
    ctx.fillStyle = '#475569';
    ctx.fillRect(CYL_LEFT - 30, CYL_TOP - 30, CYL_WIDTH + 60, CYL_BOTTOM - CYL_TOP + 40);
    // Inner chamber
    ctx.fillStyle = '#1f2937';
    ctx.fillRect(CYL_LEFT, CYL_TOP, CYL_WIDTH, CYL_HEIGHT + 10);
  }

  function drawCylinderHead(intakeOpen, exhaustOpen) {
    // Head block
    ctx.fillStyle = '#64748b';
    roundRect(CYL_LEFT - 10, CYL_TOP - 50, CYL_WIDTH + 20, 60, 6);
    ctx.fill();

    // Intake port (left) - pipe going up-left
    ctx.fillStyle = '#475569';
    ctx.beginPath();
    ctx.moveTo(INTAKE_X - 22, CYL_TOP);
    ctx.lineTo(INTAKE_X + 22, CYL_TOP);
    ctx.lineTo(INTAKE_X + 6,  CYL_TOP - 50);
    ctx.lineTo(INTAKE_X - 6,  CYL_TOP - 50);
    ctx.closePath();
    ctx.fill();

    // Exhaust port (right)
    ctx.beginPath();
    ctx.moveTo(EXHAUST_X - 22, CYL_TOP);
    ctx.lineTo(EXHAUST_X + 22, CYL_TOP);
    ctx.lineTo(EXHAUST_X + 6,  CYL_TOP - 50);
    ctx.lineTo(EXHAUST_X - 6,  CYL_TOP - 50);
    ctx.closePath();
    ctx.fill();

    // Intake valve (left)
    drawValve(INTAKE_X, CYL_TOP, intakeOpen, '#38bdf8');
    // Exhaust valve (right)
    drawValve(EXHAUST_X, CYL_TOP, exhaustOpen, '#94a3b8');
  }

  function drawValve(x, top, open, glowColor) {
    const stemH = open ? 22 : 38; // shorter stem when open
    ctx.fillStyle = '#94a3b8';
    ctx.fillRect(x - 4, top - stemH, 8, stemH);
    // valve head (disk)
    ctx.beginPath();
    ctx.ellipse(x, top - stemH, 18, 6, 0, 0, TWO_PI);
    ctx.fillStyle = '#cbd5e1';
    ctx.fill();
    ctx.strokeStyle = '#334155';
    ctx.lineWidth = 1.2;
    ctx.stroke();
    // glow ring when open
    if (open) {
      ctx.beginPath();
      ctx.ellipse(x, top - stemH, 22, 9, 0, 0, TWO_PI);
      ctx.strokeStyle = glowColor;
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.7;
      ctx.stroke();
      ctx.globalAlpha = 1;
    }
  }

  function drawCylinderContent(pistY, phase) {
    // The space between piston top and cylinder head
    const contentTop = CYL_TOP + 4;
    const contentBottom = pistY - PISTON_H / 2;
    const height = contentBottom - contentTop;
    if (height <= 0) return;

    // Base gradient
    let baseTop = '#1e293b';
    let baseBot = '#0f172a';
    if (phase === 'intake') {
      baseTop = '#7dd3fc';
      baseBot = '#0ea5e9';
    } else if (phase === 'compression') {
      baseTop = '#cbd5e1';
      baseBot = '#475569';
    } else if (phase === 'power') {
      baseTop = '#fde68a';
      baseBot = '#f97316';
    } else if (phase === 'exhaust') {
      baseTop = '#cbd5e1';
      baseBot = '#475569';
    }
    const g = ctx.createLinearGradient(0, contentTop, 0, contentBottom);
    g.addColorStop(0, baseTop);
    g.addColorStop(1, baseBot);
    ctx.fillStyle = g;
    ctx.fillRect(CYL_LEFT + 2, contentTop, CYL_WIDTH - 4, height);

    // Combustion flames (power stroke)
    if (phase === 'power') {
      drawFlames(contentTop, contentBottom);
    }

    // Intake air flow particles
    if (phase === 'intake') {
      drawIntakeFlow(contentTop, contentBottom);
    }

    // Exhaust smoke
    if (phase === 'exhaust') {
      drawExhaustFlow(contentTop, contentBottom);
    }
  }

  function drawFlames(top, bottom) {
    const cx = (CYL_LEFT + CYL_RIGHT) / 2;
    const baseY = bottom - 4;
    const flicker = Math.sin(angle * 12) * 4 + Math.cos(angle * 17) * 3;
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    // Multiple flame tongues
    for (let i = 0; i < 5; i++) {
      const fx = CYL_LEFT + 18 + i * 28;
      const fh = 30 + ((i * 7) % 15) + flicker;
      const grad = ctx.createRadialGradient(fx, baseY, 4, fx, baseY - fh / 2, fh);
      grad.addColorStop(0, 'rgba(255, 200, 60, 0.95)');
      grad.addColorStop(0.5, 'rgba(255, 140, 30, 0.7)');
      grad.addColorStop(1, 'rgba(255, 60, 0, 0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.ellipse(fx, baseY - fh / 3, 14, fh / 2, 0, 0, TWO_PI);
      ctx.fill();
    }
    // Central bright burst
    const burst = ctx.createRadialGradient(cx, top + 10, 2, cx, top + 10, 60);
    burst.addColorStop(0, 'rgba(255, 255, 220, 0.9)');
    burst.addColorStop(1, 'rgba(255, 200, 80, 0)');
    ctx.fillStyle = burst;
    ctx.fillRect(CYL_LEFT, top, CYL_WIDTH, bottom - top);
    ctx.restore();
  }

  function drawIntakeFlow(top, bottom) {
    // Spawn particles at intake
    if (Math.random() < 0.4) {
      spawnParticle(
        INTAKE_X + (Math.random() - 0.5) * 20,
        CYL_TOP - 30,
        (Math.random() - 0.5) * 0.6,
        1.4 + Math.random() * 0.8,
        `rgba(56, 189, 248, ${0.5 + Math.random() * 0.4})`,
        60 + Math.random() * 30,
        3 + Math.random() * 3
      );
    }
  }

  function drawExhaustFlow(top, bottom) {
    if (Math.random() < 0.5) {
      spawnParticle(
        EXHAUST_X + (Math.random() - 0.5) * 20,
        CYL_TOP - 30,
        (Math.random() - 0.5) * 0.6,
        -(1.4 + Math.random() * 0.8),
        `rgba(148, 163, 184, ${0.4 + Math.random() * 0.4})`,
        70 + Math.random() * 30,
        4 + Math.random() * 4
      );
    }
  }

  function updateAndDrawParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.age++;
      p.x += p.vx;
      p.y += p.vy;
      p.vy *= 0.995;
      const alpha = Math.max(0, 1 - p.age / p.life);
      ctx.fillStyle = p.color.replace(/[\d.]+\)$/, alpha + ')');
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * (0.6 + alpha * 0.4), 0, TWO_PI);
      ctx.fill();
      if (p.age >= p.life) particles.splice(i, 1);
    }
  }

  function drawPiston(wristY) {
    // Piston body — drawn around the wrist pin (which is at the piston center)
    const top = wristY - PISTON_H / 2;
    ctx.fillStyle = '#cbd5e1';
    roundRect(CYL_LEFT + 4, top, PISTON_W, PISTON_H, 4);
    ctx.fill();
    ctx.strokeStyle = '#334155';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Piston rings
    ctx.strokeStyle = '#475569';
    ctx.lineWidth = 2;
    for (let i = 0; i < 3; i++) {
      const y = top + 5 + i * 5;
      ctx.beginPath();
      ctx.moveTo(CYL_LEFT + 6, y);
      ctx.lineTo(CYL_LEFT + PISTON_W - 6, y);
      ctx.stroke();
    }

    // Wrist pin (at piston center)
    ctx.fillStyle = '#64748b';
    ctx.beginPath();
    ctx.arc(CRANK_CX, wristY, 6, 0, TWO_PI);
    ctx.fill();
    ctx.strokeStyle = '#1e293b';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  function drawConnectingRod(wristY) {
    // Crank pin position
    const pinX = CRANK_CX + CRANK_R * Math.sin(angle);
    const pinY = CRANK_CY + CRANK_R * Math.cos(angle);

    // Rod drawn from wrist pin (at piston center) to crank pin
    ctx.save();
    ctx.translate(CRANK_CX, wristY);
    const dx = pinX - CRANK_CX;
    const dy = pinY - wristY;
    const len = Math.hypot(dx, dy);
    const ang = Math.atan2(dy, dx);
    ctx.rotate(ang);

    // Rod shaft
    ctx.fillStyle = '#64748b';
    roundRect(0, -5, len, 10, 3);
    ctx.fill();
    ctx.strokeStyle = '#1e293b';
    ctx.lineWidth = 1.2;
    ctx.stroke();

    // Big end (toward crank pin)
    ctx.fillStyle = '#94a3b8';
    ctx.beginPath();
    ctx.arc(len, 0, 12, 0, TWO_PI);
    ctx.fill();
    ctx.strokeStyle = '#1e293b';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Small end (at wrist pin = local origin)
    ctx.fillStyle = '#cbd5e1';
    ctx.beginPath();
    ctx.arc(0, 0, 9, 0, TWO_PI);
    ctx.fill();
    ctx.strokeStyle = '#1e293b';
    ctx.lineWidth = 1.2;
    ctx.stroke();

    ctx.restore();
  }

  function drawCrankshaft() {
    // Crank center main journal
    ctx.save();
    ctx.translate(CRANK_CX, CRANK_CY);

    // Web (rotating with crank)
    ctx.save();
    ctx.rotate(angle);

    // Crank webs (two opposite arms)
    ctx.fillStyle = '#475569';
    roundRect(-12, -CRANK_R - 10, 24, CRANK_R + 10, 4);
    ctx.fill();
    roundRect(-12, 0, 24, CRANK_R + 10, 4);
    ctx.fill();

    // Counterweights
    ctx.fillStyle = '#334155';
    ctx.beginPath();
    ctx.arc(0, CRANK_R + 8, 18, 0, TWO_PI);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(0, -(CRANK_R + 8), 18, 0, TWO_PI);
    ctx.fill();

    // Crank pin (offset)
    ctx.fillStyle = '#f59e0b';
    ctx.beginPath();
    ctx.arc(0, CRANK_R, 8, 0, TWO_PI);
    ctx.fill();
    ctx.strokeStyle = '#1e293b';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    ctx.restore();

    // Main journal (stationary center)
    ctx.fillStyle = '#1e293b';
    ctx.beginPath();
    ctx.arc(0, 0, 16, 0, TWO_PI);
    ctx.fill();
    ctx.strokeStyle = '#cbd5e1';
    ctx.lineWidth = 2;
    ctx.stroke();
    // Center dot
    ctx.fillStyle = '#94a3b8';
    ctx.beginPath();
    ctx.arc(0, 0, 4, 0, TWO_PI);
    ctx.fill();

    ctx.restore();

    // Crankcase (housing)
    ctx.fillStyle = '#1e293b';
    roundRect(CRANK_CX - 110, CRANK_CY - 30, 220, 80, 8);
    ctx.fill();
    ctx.strokeStyle = '#334155';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    // Oil pan hint
    ctx.fillStyle = '#0f172a';
    roundRect(CRANK_CX - 80, CRANK_CY + 50, 160, 30, 6);
    ctx.fill();
    ctx.stroke();
  }

  function drawSparkPlug(phase) {
    const x = (CYL_LEFT + CYL_RIGHT) / 2;
    const y = CYL_TOP - 50;
    // Plug body
    ctx.fillStyle = '#475569';
    roundRect(x - 6, y - 22, 12, 22, 2);
    ctx.fill();
    ctx.strokeStyle = '#334155';
    ctx.lineWidth = 1;
    ctx.stroke();
    // Terminal
    ctx.fillStyle = '#94a3b8';
    ctx.beginPath();
    ctx.arc(x, y - 22, 5, 0, TWO_PI);
    ctx.fill();

    // Spark at end of compression / start of power
    if (phase === 'power') {
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      const g = ctx.createRadialGradient(x, y, 1, x, y, 22);
      g.addColorStop(0, 'rgba(255, 255, 220, 1)');
      g.addColorStop(0.4, 'rgba(255, 200, 80, 0.7)');
      g.addColorStop(1, 'rgba(255, 80, 0, 0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(x, y, 22, 0, TWO_PI);
      ctx.fill();
      ctx.restore();
    }
  }

  function drawLabels(phase) {
    ctx.fillStyle = '#e2e8f0';
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'center';
    // Intake label
    ctx.fillText('INTAKE', INTAKE_X, CYL_TOP - 56);
    // Exhaust label
    ctx.fillText('EXHAUST', EXHAUST_X, CYL_TOP - 56);
    // Spark
    ctx.fillText('SPARK', (CYL_LEFT + CYL_RIGHT) / 2, CYL_TOP - 80);
    // Crank
    ctx.fillText('CRANK', CRANK_CX, CRANK_CY + 100);
    // Cylinder
    ctx.fillText('CYLINDER', CRANK_CX, CYL_TOP - 100);
    // Piston / rod info
    ctx.textAlign = 'left';
    ctx.fillText(`θ = ${(angle * 180 / Math.PI % 720).toFixed(0)}°`, 20, H - 14);
    ctx.textAlign = 'right';
    ctx.fillText(phase.label, W - 20, H - 14);
  }

  function draw() {
    // Background
    ctx.fillStyle = '#0f172a';
    ctx.fillRect(0, 0, W, H);

    // Grid
    ctx.strokeStyle = 'rgba(51, 65, 85, 0.3)';
    ctx.lineWidth = 1;
    for (let x = 0; x < W; x += 40) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, H);
      ctx.stroke();
    }
    for (let y = 0; y < H; y += 40) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(W, y);
      ctx.stroke();
    }

    const phase = getPhase4(angle);
    const info = PHASE_INFO[phase];

    // Update label
    const label = document.getElementById('phaseLabel');
    label.textContent = info.label;
    label.classList.add('active');

    // 1. Cylinder walls / block
    drawCylinderWalls();

    // 2. Cylinder head + valves
    drawCylinderHead(info.intakeOpen, info.exhaustOpen);

    // 3. Spark plug
    drawSparkPlug(phase);

    // 4. Compute piston position
    const pistY = pistonY(angle);

    // 5. Cylinder content (colored by phase)
    drawCylinderContent(pistY, phase);

    // 6. Piston
    drawPiston(pistY);

    // 7. Connecting rod
    drawConnectingRod(pistY);

    // 8. Crankshaft (drawn after rod to overlap)
    drawCrankshaft();

    // 9. Particles (drawn on top of cylinder area)
    updateAndDrawParticles();

    // 10. Labels
    drawLabels(info);
  }

  requestAnimationFrame((t) => {
    lastT = t;
    requestAnimationFrame(step);
  });
})();
</script>
</body>
</html>
