<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>四冲程活塞发动机剖面动画</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(to bottom, #1a2980, #26d0ce);
            font-family: Arial, sans-serif;
        }
        
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        
        h1 {
            color: white;
            margin-bottom: 20px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        
        .engine-container {
            position: relative;
            width: 600px;
            height: 500px;
            margin: 0 auto;
        }
        
        .cylinder {
            position: absolute;
            left: 250px;
            top: 50px;
            width: 100px;
            height: 300px;
            border: 4px solid #333;
            border-radius: 0 0 10px 10px;
            background: linear-gradient(to right, #666, #888, #666);
            overflow: hidden;
        }
        
        .piston {
            position: absolute;
            left: 5px;
            width: 90px;
            height: 40px;
            background: linear-gradient(to bottom, #444, #666, #444);
            border-radius: 5px;
            transition: top 0.05s linear;
        }
        
        .connecting-rod {
            position: absolute;
            width: 4px;
            background: #222;
            transform-origin: top center;
        }
        
        .crankshaft {
            position: absolute;
            left: 275px;
            top: 380px;
            width: 50px;
            height: 50px;
            border: 3px solid #333;
            border-radius: 50%;
            background: linear-gradient(45deg, #555, #777);
        }
        
        .crank-pin {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #222;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        .valve-intake {
            position: absolute;
            left: 230px;
            top: 40px;
            width: 20px;
            height: 20px;
            background: #f00;
            border-radius: 50%;
            opacity: 0.7;
        }
        
        .valve-exhaust {
            position: absolute;
            left: 350px;
            top: 40px;
            width: 20px;
            height: 20px;
            background: #f00;
            border-radius: 50%;
            opacity: 0.7;
        }
        
        .stroke-label {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-weight: bold;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 5px;
        }
        
        .controls {
            margin-top: 20px;
            color: white;
        }
        
        .speed-control {
            margin-top: 10px;
        }
        
        input[type="range"] {
            width: 200px;
            vertical-align: middle;
        }
        
        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
            color: white;
            flex-wrap: wrap;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .color-box {
            width: 20px;
            height: 20px;
            border-radius: 3px;
        }
        
        .intake-color { background: linear-gradient(45deg, #4A90E2, #007AFF); }
        .compression-color { background: linear-gradient(45deg, #FFD700, #FFA500); }
        .power-color { background: linear-gradient(45deg, #FF4500, #FF8C00); }
        .exhaust-color { background: linear-gradient(45deg, #808080, #A9A9A9); }
    </style>
</head>
<body>
    <div class="container">
        <h1>四冲程活塞发动机剖面动画</h1>
        <div class="engine-container">
            <div class="cylinder">
                <div class="stroke-label" id="strokeLabel">进气冲程</div>
                <div class="piston" id="piston"></div>
                <div class="connecting-rod" id="connectingRod"></div>
                <div class="combustion-chamber" id="combustionChamber"></div>
            </div>
            <div class="valve-intake" id="intakeValve"></div>
            <div class="valve-exhaust" id="exhaustValve"></div>
            <div class="crankshaft" id="crankshaft">
                <div class="crank-pin" id="crankPin"></div>
            </div>
        </div>
        
        <div class="controls">
            <div class="speed-control">
                <label for="speedControl" style="color: white;">动画速度: </label>
                <input type="range" id="speedControl" min="50" max="300" value="150">
            </div>
        </div>
        
        <div class="legend">
            <div class="legend-item">
                <div class="color-box intake-color"></div>
                <span>进气 (蓝色)</span>
            </div>
            <div class="legend-item">
                <div class="color-box compression-color"></div>
                <span>压缩 (黄色)</span>
            </div>
            <div class="legend-item">
                <div class="color-box power-color"></div>
                <span>动力 (橙色)</span>
            </div>
            <div class="legend-item">
                <div class="color-box exhaust-color"></div>
                <span>排气 (灰色)</span>
            </div>
        </div>
    </div>

    <script>
        // 获取DOM元素
        const piston = document.getElementById('piston');
        const connectingRod = document.getElementById('connectingRod');
        const crankshaft = document.getElementById('crankshaft');
        const crankPin = document.getElementById('crankPin');
        const strokeLabel = document.getElementById('strokeLabel');
        const combustionChamber = document.getElementById('combustionChamber');
        const intakeValve = document.getElementById('intakeValve');
        const exhaustValve = document.getElementById('exhaustValve');
        const speedControl = document.getElementById('speedControl');
        
        // 发动机参数
        const CYLINDER_HEIGHT = 300;
        const PISTON_HEIGHT = 40;
        const CONNECTING_ROD_LENGTH = 120;
        const CRANK_RADIUS = 40;
        const CRANK_CENTER_X = 25;
        const CRANK_CENTER_Y = 25;
        
        // 动画状态
        let angle = 0; // 曲轴角度
        let currentStroke = 0; // 0:进气, 1:压缩, 2:动力, 3:排气
        let animationId;
        
        // 四冲程角度范围
        const STROKE_ANGLES = [
            { start: 0, end: 180, name: "进气冲程", color: "#4A90E2" },     // 进气: 0-180度
            { start: 180, end: 360, name: "压缩冲程", color: "#FFD700" },   // 压缩: 180-360度
            { start: 360, end: 540, name: "动力冲程", color: "#FF4500" },   // 动力: 360-540度
            { start: 540, end: 720, name: "排气冲程", color: "#808080" }    // 排气: 540-720度
        ];
        
        // 计算活塞位置和连杆角度
        function calculatePistonPosition(angleDeg) {
            // 将角度转换为弧度
            const angleRad = (angleDeg % 360) * Math.PI / 180;
            
            // 计算曲柄销的位置
            const crankX = CRANK_CENTER_X + CRANK_RADIUS * Math.cos(angleRad);
            const crankY = CRANK_CENTER_Y + CRANK_RADIUS * Math.sin(angleRad);
            
            // 计算活塞的垂直位置（考虑连杆长度）
            const pistonY = crankY + Math.sqrt(CONNECTING_ROD_LENGTH * CONNECTING_ROD_LENGTH - 
                                             CRANK_RADIUS * CRANK_RADIUS * Math.sin(angleRad) * Math.sin(angleRad));
            
            return {
                pistonTop: 50 + pistonY,
                connectingRodAngle: Math.atan2(crankY - CRANK_CENTER_Y, crankX - CRANK_CENTER_X) * 180 / Math.PI
            };
        }
        
        // 更新阀门状态
        function updateValves(currentAngle) {
            // 进气阀在0-180度和540-720度打开
            const normalizedAngle = currentAngle % 720;
            const intakeOpen = (normalizedAngle >= 0 && normalizedAngle < 180) || 
                             (normalizedAngle >= 540 && normalizedAngle < 720);
            const exhaustOpen = (normalizedAngle >= 360 && normalizedAngle < 540);
            
            intakeValve.style.opacity = intakeOpen ? '1' : '0.3';
            exhaustValve.style.opacity = exhaustOpen ? '1' : '0.3';
        }
        
        // 更新冲程标签
        function updateStrokeLabel(currentAngle) {
            const normalizedAngle = currentAngle % 720;
            for (let i = 0; i < STROKE_ANGLES.length; i++) {
                if (normalizedAngle >= STROKE_ANGLES[i].start && normalizedAngle < STROKE_ANGLES[i].end) {
                    strokeLabel.textContent = STROKE_ANGLES[i].name;
                    strokeLabel.style.backgroundColor = `${STROKE_ANGLES[i].color}80`; // 透明度
                    currentStroke = i;
                    break;
                }
            }
        }
        
        // 更新燃烧室效果
        function updateCombustionEffect() {
            // 清除之前的燃烧室元素
            while (combustionChamber.firstChild) {
                combustionChamber.removeChild(combustionChamber.firstChild);
            }
            
            if (currentStroke === 2) { // 动力冲程
                // 创建火焰效果
                for (let i = 0; i < 5; i++) {
                    const flame = document.createElement('div');
                    flame.style.position = 'absolute';
                    flame.style.width = '10px';
                    flame.style.height = '20px';
                    flame.style.background = `radial-gradient(circle, ${i % 2 === 0 ? '#FF4500' : '#FFD700'}, transparent)`;
                    flame.style.borderRadius = '50%';
                    flame.style.left = `${Math.random() * 80 + 10}px`;
                    flame.style.top = `${Math.random() * 40 + 10}px`;
                    flame.style.opacity = '0.7';
                    flame.style.animation = `pulse ${0.5 + Math.random() * 0.5}s infinite alternate`;
                    combustionChamber.appendChild(flame);
                }
            }
        }
        
        // 动画循环
        function animate() {
            const speed = 300 - speedControl.value; // 反向映射滑块值到速度
            const angleIncrement = 2; // 每帧增加的角度
            
            // 更新角度
            angle += angleIncrement * (60 / speed); // 根据速度调整增量
            
            // 计算活塞位置
            const pos = calculatePistonPosition(angle);
            
            // 更新活塞位置
            piston.style.top = `${pos.pistonTop}px`;
            
            // 更新连杆
            connectingRod.style.height = `${CONNECTING_ROD_LENGTH}px`;
            connectingRod.style.left = `${250 + 45}px`; // 位置略偏移以连接活塞
            connectingRod.style.top = `${pos.pistonTop - CONNECTING_ROD_LENGTH + 20}px`;
            connectingRod.style.transform = `rotate(${pos.connectingRodAngle}deg)`;
            
            // 更新曲轴旋转
            crankshaft.style.transform = `rotate(${angle % 360}deg)`;
            
            // 更新阀门状态
            updateValves(angle);
            
            // 更新冲程标签
            updateStrokeLabel(angle);
            
            // 更新燃烧效果
            updateCombustionEffect();
            
            // 循环动画
            animationId = requestAnimationFrame(animate);
        }
        
        // 启动动画
        animate();
        
        // 添加脉冲动画CSS
        const style = document.createElement('style');
        style.textContent = `
            @keyframes pulse {
                0% { transform: scale(1); opacity: 0.7; }
                100% { transform: scale(1.2); opacity: 0.9; }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
