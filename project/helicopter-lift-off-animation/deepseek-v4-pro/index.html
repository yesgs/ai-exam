<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>直升机起飞动画</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    width: 100vw;
    font-family: system-ui, sans-serif;
  }
  canvas { display: block; }
  .info {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.5);
    font-size: 12px;
    pointer-events: none;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="info">HELICOPTER TAKEOFF SEQUENCE</div>
<script>
(function() {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  let W, H, groundY, cx, cy;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    groundY = H * 0.72;
    cx = W / 2;
    cy = groundY - 52;
  }
  window.addEventListener('resize', resize);
  resize();

  // ── State ──────────────────────────────────────────────
  const S = {
    time: 0,
    rotorAngle: 0,
    rotorSpeed: 0,          // current rad/s
    targetRotorSpeed: 0,
    tailRotorAngle: 0,
    tailRotorSpeed: 18,     // tail rotor always spins fast
    altitude: 0,            // px above ground
    verticalSpeed: 0,
    shakeX: 0,
    shakeY: 0,
    shakeIntensity: 0,
    particles: [],
    phase: 'idle',          // idle | spinup | shaking | liftoff | climbing
  };

  // Timing (seconds)
  const T = {
    SPINUP_START:  0.6,
    SPINUP_END:    4.2,
    SHAKE_START:   3.5,
    LIFTOFF_START: 5.0,
    LIFTOFF_DURATION: 2.5,
    FULL_SPEED:    38,      // rad/s at 100%
    IDLE_SPEED:    0.4,
  };

  // ── Easing helpers ────────────────────────────────────
  function easeInOutCubic(t) {
    return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
  }
  function easeOutCubic(t) {
    return 1 - Math.pow(1 - t, 3);
  }
  function easeOutQuad(t) {
    return 1 - (1 - t) * (1 - t);
  }
  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
  function lerp(a, b, t) { return a + (b - a) * t; }

  // ── Particle system ───────────────────────────────────
  function spawnParticles(dt) {
    if (S.altitude > 60) return;
    const rate = clamp((S.rotorSpeed - 2) / T.FULL_SPEED, 0, 1);
    if (rate <= 0) return;

    const spawnPerSec = rate * 80;
    const count = Math.floor(spawnPerSec * dt + Math.random() * 0.5);
    const hx = cx + S.shakeX;
    const hy = groundY + S.shakeY;

    for (let i = 0; i < count; i++) {
      const spreadX = 80 + rate * 60;
      const px = hx + (Math.random() - 0.5) * spreadX * 2;
      const py = hy - 5 + Math.random() * 15;
      const angle = Math.atan2(py - hy, px - hx);
      const speed = 30 + Math.random() * 120 * rate;
      S.particles.push({
        x: px,
        y: py,
        vx: Math.cos(angle) * speed + (Math.random() - 0.5) * 40,
        vy: -30 - Math.random() * 80 * rate + Math.random() * 20,
        life: 0.4 + Math.random() * 1.6,
        maxLife: 0.4 + Math.random() * 1.6,
        size: 1 + Math.random() * 3.5,
        opacity: 0.3 + Math.random() * 0.7,
      });
    }
  }

  function updateParticles(dt) {
    for (let i = S.particles.length - 1; i >= 0; i--) {
      const p = S.particles[i];
      p.life -= dt;
      if (p.life <= 0) { S.particles.splice(i, 1); continue; }
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 50 * dt; // gravity
      p.vx *= 0.99;
    }
  }

  function drawParticles(ctx) {
    for (const p of S.particles) {
      const alpha = (p.life / p.maxLife) * p.opacity;
      const sz = p.size * (0.4 + 0.6 * (p.life / p.maxLife));
      ctx.fillStyle = `rgba(180,150,120,${alpha})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, sz, 0, Math.PI * 2);
      ctx.fill();
      // tiny inner highlight
      ctx.fillStyle = `rgba(210,190,160,${alpha * 0.6})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, sz * 0.45, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // ── Drawing: Ground & Sky ─────────────────────────────
  function drawBackground(ctx) {
    // Sky gradient
    const sky = ctx.createLinearGradient(0, 0, 0, groundY);
    sky.addColorStop(0, '#3a6fb5');
    sky.addColorStop(0.5, '#7eb8da');
    sky.addColorStop(0.85, '#c8dbe8');
    sky.addColorStop(1, '#d4d8cc');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, groundY);

    // Subtle clouds
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    drawCloud(ctx, W * 0.15, groundY * 0.28, 0.9);
    drawCloud(ctx, W * 0.35, groundY * 0.18, 1.0);
    drawCloud(ctx, W * 0.62, groundY * 0.34, 1.1);
    drawCloud(ctx, W * 0.80, groundY * 0.22, 0.85);
    drawCloud(ctx, W * 0.50, groundY * 0.42, 0.7);

    // Ground
    const gnd = ctx.createLinearGradient(0, groundY, 0, H);
    gnd.addColorStop(0, '#8a7d6b');
    gnd.addColorStop(0.03, '#9b8d7a');
    gnd.addColorStop(0.15, '#7a6e5d');
    gnd.addColorStop(1, '#5a4f3f');
    ctx.fillStyle = gnd;
    ctx.fillRect(0, groundY, W, H - groundY);

    // Horizon line
    ctx.strokeStyle = 'rgba(0,0,0,0.12)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, groundY);
    ctx.lineTo(W, groundY);
    ctx.stroke();

    // Ground texture dots
    ctx.fillStyle = 'rgba(0,0,0,0.04)';
    const seed = 42;
    for (let i = 0; i < 60; i++) {
      const px = ((i * 173 + seed) % 1000) / 1000 * W;
      const py = groundY + 8 + ((i * 97) % 200);
      if (py < H) {
        ctx.beginPath();
        ctx.arc(px, py, 1.5 + (i % 3), 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  function drawCloud(ctx, x, y, scale) {
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(scale, scale);
    ctx.beginPath();
    ctx.arc(0, 0, 30, 0, Math.PI * 2);
    ctx.arc(28, -5, 22, 0, Math.PI * 2);
    ctx.arc(-22, 2, 20, 0, Math.PI * 2);
    ctx.arc(10, -12, 18, 0, Math.PI * 2);
    ctx.arc(-8, -8, 25, 0, Math.PI * 2);
    ctx.arc(40, 0, 16, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // ── Drawing: Ground Shadow ────────────────────────────
  function drawGroundShadow(ctx, hx, hy) {
    const gy = groundY + 2;
    const speedRatio = clamp(S.rotorSpeed / T.FULL_SPEED, 0, 1);

    // Main shadow under body
    const shadowAlpha = clamp(0.25 + speedRatio * 0.45 - clamp(S.altitude / 200, 0, 0.6), 0, 0.7);
    const spreadX = 70 + speedRatio * 20 + S.altitude * 0.25;
    const spreadY = 10 + speedRatio * 8 + S.altitude * 0.08;

    // Draw 3 overlapping ellipses for soft shadow
    for (let i = 0; i < 3; i++) {
      const sx = spreadX + i * 8;
      const sy = spreadY + i * 2;
      const alpha = shadowAlpha * (0.25 + i * 0.2);
      ctx.fillStyle = `rgba(30,20,10,${alpha})`;
      ctx.beginPath();
      ctx.ellipse(hx, gy, sx, sy, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    // Rotor downwash shadow (larger, fainter circle)
    const washAlpha = speedRatio * 0.18 * clamp(1 - S.altitude / 80, 0, 1);
    if (washAlpha > 0.01) {
      const washR = 100 + speedRatio * 80 + S.altitude * 0.5;
      ctx.fillStyle = `rgba(30,20,10,${washAlpha})`;
      ctx.beginPath();
      ctx.ellipse(hx, gy, washR, washR * 0.3, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // ── Drawing: Helicopter Body ──────────────────────────
  function drawFuselage(ctx) {
    // Main cabin body - rounded shape
    ctx.save();

    // Body gradient (3D effect)
    const bodyGrad = ctx.createLinearGradient(0, -38, 0, 35);
    bodyGrad.addColorStop(0, '#e8e8e8');
    bodyGrad.addColorStop(0.3, '#f5f5f5');
    bodyGrad.addColorStop(0.5, '#ffffff');
    bodyGrad.addColorStop(0.7, '#dcdcdc');
    bodyGrad.addColorStop(0.85, '#c0c0c0');
    bodyGrad.addColorStop(1, '#a0a0a0');

    // Draw cabin
    ctx.fillStyle = bodyGrad;
    ctx.beginPath();
    // Bottom: flat-ish with slight curve
    ctx.moveTo(-42, 24);
    ctx.quadraticCurveTo(-50, 28, -54, 22);
    ctx.lineTo(-58, 18);
    // Back/tail connection
    ctx.quadraticCurveTo(-55, -20, -45, -28);
    // Top curve
    ctx.quadraticCurveTo(-20, -38, 10, -38);
    ctx.quadraticCurveTo(35, -38, 52, -30);
    // Nose - rounded front
    ctx.quadraticCurveTo(68, -20, 70, 0);
    ctx.quadraticCurveTo(70, 10, 65, 18);
    ctx.quadraticCurveTo(58, 26, 40, 28);
    // Bottom front
    ctx.quadraticCurveTo(10, 30, -20, 28);
    ctx.quadraticCurveTo(-35, 26, -42, 24);
    ctx.closePath();
    ctx.fill();

    // Body outline
    ctx.strokeStyle = 'rgba(0,0,0,0.2)';
    ctx.lineWidth = 1.2;
    ctx.stroke();

    // Accent stripe (red)
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(-46, 6);
    ctx.quadraticCurveTo(-40, 2, -20, 0);
    ctx.quadraticCurveTo(0, -2, 25, -1);
    ctx.quadraticCurveTo(48, 0, 60, 4);
    ctx.quadraticCurveTo(62, 8, 58, 12);
    ctx.quadraticCurveTo(44, 10, 22, 9);
    ctx.quadraticCurveTo(0, 8, -20, 8);
    ctx.quadraticCurveTo(-42, 8, -46, 10);
    ctx.closePath();
    const stripeGrad = ctx.createLinearGradient(0, 0, 0, 12);
    stripeGrad.addColorStop(0, '#d4443b');
    stripeGrad.addColorStop(0.5, '#e8554d');
    stripeGrad.addColorStop(1, '#b8332a');
    ctx.fillStyle = stripeGrad;
    ctx.fill();
    ctx.restore();

    // Thin blue stripe below red
    ctx.beginPath();
    ctx.moveTo(-44, 13);
    ctx.quadraticCurveTo(-20, 12, 20, 12);
    ctx.quadraticCurveTo(42, 12, 56, 16);
    ctx.lineTo(54, 19);
    ctx.quadraticCurveTo(40, 15, 18, 15);
    ctx.quadraticCurveTo(-20, 15, -44, 16);
    ctx.closePath();
    ctx.fillStyle = '#2a5088';
    ctx.fill();

    ctx.restore();
  }

  function drawCockpit(ctx) {
    ctx.save();

    // Main windshield - curved
    const glassGrad = ctx.createLinearGradient(50, -25, 68, -5);
    glassGrad.addColorStop(0, '#a8d8f0');
    glassGrad.addColorStop(0.3, '#c8e8ff');
    glassGrad.addColorStop(0.7, '#7bb8d8');
    glassGrad.addColorStop(1, '#4a88a8');

    ctx.fillStyle = glassGrad;
    ctx.beginPath();
    ctx.moveTo(24, -22);
    ctx.quadraticCurveTo(40, -28, 52, -25);
    ctx.quadraticCurveTo(64, -18, 68, -4);
    ctx.quadraticCurveTo(66, 6, 62, 12);
    ctx.lineTo(38, 14);
    ctx.quadraticCurveTo(32, -2, 24, -8);
    ctx.quadraticCurveTo(20, -14, 24, -22);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Windshield reflection
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.beginPath();
    ctx.moveTo(30, -18);
    ctx.quadraticCurveTo(42, -22, 52, -20);
    ctx.quadraticCurveTo(48, -16, 38, -14);
    ctx.quadraticCurveTo(32, -12, 30, -18);
    ctx.closePath();
    ctx.fill();

    // Side window
    ctx.fillStyle = 'rgba(160,210,235,0.7)';
    ctx.beginPath();
    ctx.moveTo(5, -20);
    ctx.lineTo(22, -18);
    ctx.lineTo(22, 1);
    ctx.lineTo(5, 2);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.2)';
    ctx.stroke();

    // Side window reflection
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.beginPath();
    ctx.moveTo(8, -17);
    ctx.lineTo(16, -15);
    ctx.lineTo(15, -10);
    ctx.lineTo(7, -12);
    ctx.closePath();
    ctx.fill();

    // Small window on cabin side (rear)
    ctx.fillStyle = 'rgba(160,210,235,0.6)';
    ctx.beginPath();
    ctx.roundRect(-18, -16, 14, 10, 3);
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.2)';
    ctx.stroke();

    ctx.restore();
  }

  function drawTailBoom(ctx) {
    ctx.save();

    // Tail boom - tapered
    const boomGrad = ctx.createLinearGradient(0, -10, 0, 12);
    boomGrad.addColorStop(0, '#e0e0e0');
    boomGrad.addColorStop(0.4, '#f0f0f0');
    boomGrad.addColorStop(0.6, '#d8d8d8');
    boomGrad.addColorStop(1, '#b0b0b0');

    ctx.fillStyle = boomGrad;
    ctx.beginPath();
    // Top edge
    ctx.moveTo(-45, -14);
    ctx.quadraticCurveTo(-90, -12, -140, -6);
    ctx.lineTo(-165, -2);
    // Back end
    ctx.lineTo(-168, 2);
    // Bottom edge
    ctx.lineTo(-140, 8);
    ctx.quadraticCurveTo(-90, 14, -45, 16);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.15)';
    ctx.lineWidth = 0.8;
    ctx.stroke();

    // Top ridge line
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-44, -13);
    ctx.quadraticCurveTo(-90, -11, -140, -5);
    ctx.stroke();

    ctx.restore();
  }

  function drawTailFin(ctx) {
    ctx.save();

    // Upper vertical stabilizer
    const finGrad = ctx.createLinearGradient(-168, -22, -160, -22);
    finGrad.addColorStop(0, '#d0d0d0');
    finGrad.addColorStop(0.5, '#e8e8e8');
    finGrad.addColorStop(1, '#c8c8c8');

    ctx.fillStyle = finGrad;
    ctx.beginPath();
    ctx.moveTo(-150, -4);
    ctx.lineTo(-155, -22);
    ctx.quadraticCurveTo(-162, -24, -168, -20);
    ctx.lineTo(-170, -3);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.2)';
    ctx.lineWidth = 0.8;
    ctx.stroke();

    // Lower fin
    ctx.fillStyle = '#c8c8c8';
    ctx.beginPath();
    ctx.moveTo(-152, 4);
    ctx.lineTo(-157, 16);
    ctx.quadraticCurveTo(-164, 14, -168, 10);
    ctx.lineTo(-170, 4);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Horizontal stabilizer
    ctx.fillStyle = '#d8d8d8';
    ctx.beginPath();
    ctx.moveTo(-140, -5);
    ctx.lineTo(-145, -16);
    ctx.quadraticCurveTo(-155, -18, -158, -15);
    ctx.lineTo(-152, -4);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.15)';
    ctx.stroke();

    ctx.restore();
  }

  function drawLandingSkids(ctx) {
    ctx.save();

    const skidColor = '#555';
    const skidHighlight = '#777';

    // Rear strut
    ctx.strokeStyle = skidColor;
    ctx.lineWidth = 3.5;
    ctx.beginPath();
    ctx.moveTo(-28, 20);
    ctx.lineTo(-32, 38);
    ctx.stroke();
    ctx.strokeStyle = skidHighlight;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-29, 20);
    ctx.lineTo(-32, 38);
    ctx.stroke();

    // Front strut
    ctx.strokeStyle = skidColor;
    ctx.lineWidth = 3.5;
    ctx.beginPath();
    ctx.moveTo(28, 22);
    ctx.lineTo(24, 38);
    ctx.stroke();
    ctx.strokeStyle = skidHighlight;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(27, 22);
    ctx.lineTo(23, 38);
    ctx.stroke();

    // Left skid tube
    ctx.strokeStyle = '#4a4a4a';
    ctx.lineWidth = 5;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(-50, 40);
    ctx.lineTo(42, 40);
    ctx.stroke();
    // Highlight
    ctx.strokeStyle = '#666';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(-48, 38.5);
    ctx.lineTo(40, 38.5);
    ctx.stroke();

    // Right skid tube (slightly lower for perspective)
    ctx.strokeStyle = '#3a3a3a';
    ctx.lineWidth = 4.5;
    ctx.beginPath();
    ctx.moveTo(-48, 44);
    ctx.lineTo(40, 44);
    ctx.stroke();

    // Cross tubes between skids
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 2;
    // Rear cross
    ctx.beginPath();
    ctx.moveTo(-44, 40);
    ctx.lineTo(-42, 44);
    ctx.stroke();
    // Front cross
    ctx.beginPath();
    ctx.moveTo(36, 40);
    ctx.lineTo(34, 44);
    ctx.stroke();

    ctx.restore();
  }

  function drawEngineIntake(ctx) {
    ctx.save();
    // Engine intake on top
    const intakeGrad = ctx.createLinearGradient(0, -40, 0, -30);
    intakeGrad.addColorStop(0, '#888');
    intakeGrad.addColorStop(1, '#444');
    ctx.fillStyle = intakeGrad;
    ctx.beginPath();
    ctx.ellipse(-5, -36, 14, 6, 0, Math.PI, 0);
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 0.8;
    ctx.stroke();

    // Exhaust pipe at rear top
    ctx.fillStyle = '#555';
    ctx.beginPath();
    ctx.roundRect(-40, -34, 16, 8, 3);
    ctx.fill();
    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.roundRect(-38, -32, 12, 4, 2);
    ctx.fill();

    ctx.restore();
  }

  function drawMainRotorMast(ctx) {
    ctx.save();
    // Mast
    const mastGrad = ctx.createLinearGradient(0, -36, 0, -55);
    mastGrad.addColorStop(0, '#999');
    mastGrad.addColorStop(0.4, '#ccc');
    mastGrad.addColorStop(1, '#777');
    ctx.fillStyle = mastGrad;
    ctx.fillRect(-3, -55, 6, 20);
    ctx.strokeStyle = 'rgba(0,0,0,0.2)';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(-3, -55, 6, 20);

    // Hub base
    ctx.fillStyle = '#666';
    ctx.beginPath();
    ctx.arc(0, -56, 7, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#888';
    ctx.beginPath();
    ctx.arc(0, -56, 4.5, 0, Math.PI * 2);
    ctx.fill();

    // Hub cap
    const hubGrad = ctx.createLinearGradient(0, -59, 0, -54);
    hubGrad.addColorStop(0, '#ddd');
    hubGrad.addColorStop(0.5, '#aaa');
    hubGrad.addColorStop(1, '#777');
    ctx.fillStyle = hubGrad;
    ctx.beginPath();
    ctx.arc(0, -57, 5, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  // ── Drawing: Rotors ───────────────────────────────────
  function drawMainRotor(ctx) {
    ctx.save();
    const hubX = 0;
    const hubY = -57;
    const bladeLen = 155;
    const discHeight = 14; // visible disc thickness from side view
    const speedRatio = clamp(S.rotorSpeed / T.FULL_SPEED, 0, 1);
    const numBlades = 4;

    // ── Motion blur disc ──
    // As speed increases, draw a semi-transparent ellipse representing the blurred disc
    const discAlpha = speedRatio * 0.55;
    if (discAlpha > 0.01) {
      // Outer disc
      const discGrad = ctx.createLinearGradient(0, hubY - discHeight, 0, hubY + discHeight);
      discGrad.addColorStop(0, `rgba(180,180,190,0)`);
      discGrad.addColorStop(0.25, `rgba(200,200,210,${discAlpha * 0.6})`);
      discGrad.addColorStop(0.5, `rgba(220,220,225,${discAlpha})`);
      discGrad.addColorStop(0.75, `rgba(200,200,210,${discAlpha * 0.6})`);
      discGrad.addColorStop(1, `rgba(180,180,190,0)`);

      ctx.fillStyle = discGrad;
      ctx.beginPath();
      ctx.ellipse(hubX, hubY, bladeLen * 0.96, discHeight + speedRatio * 4, 0, 0, Math.PI * 2);
      ctx.fill();

      // Tip highlight ring
      ctx.strokeStyle = `rgba(200,200,210,${discAlpha * 0.5})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.ellipse(hubX, hubY, bladeLen * 0.94, discHeight * 0.6 + speedRatio * 3, 0, 0, Math.PI * 2);
      ctx.stroke();
    }

    // ── Draw individual blades ──
    for (let i = 0; i < numBlades; i++) {
      const angle = S.rotorAngle + (i * Math.PI * 2) / numBlades;
      const cos = Math.cos(angle);
      const sin = Math.sin(angle);

      // Tip position on the ellipse
      const tipX = hubX + cos * bladeLen;
      const tipY = hubY + sin * discHeight;

      // Blade alpha decreases with speed (blades become less distinct)
      const bladeAlpha = 1 - speedRatio * 0.7;

      ctx.save();
      ctx.globalAlpha = bladeAlpha;

      // Blade body (slightly tapered)
      const bw1 = 3.5; // width at hub
      const bw2 = 2.2; // width at tip

      const perpX = -sin;
      const perpY = cos;

      const hx1 = hubX + perpX * bw1;
      const hy1 = hubY + perpY * bw1;
      const hx2 = hubX - perpX * bw1;
      const hy2 = hubY - perpY * bw1;

      const tx1 = tipX + perpX * bw2;
      const ty1 = tipY + perpY * bw2;
      const tx2 = tipX - perpX * bw2;
      const ty2 = tipY - perpY * bw2;

      // Blade gradient
      const bladeGrad = ctx.createLinearGradient(hubX, hubY, tipX, tipY);
      bladeGrad.addColorStop(0, '#555');
      bladeGrad.addColorStop(0.3, '#6a6a6a');
      bladeGrad.addColorStop(0.7, '#4a4a4a');
      bladeGrad.addColorStop(1, '#333');

      ctx.fillStyle = bladeGrad;
      ctx.beginPath();
      ctx.moveTo(hx1, hy1);
      ctx.lineTo(tx1, ty1);
      ctx.quadraticCurveTo(tipX + perpX * 0.5, tipY + perpY * 0.5, tx2, ty2);
      ctx.lineTo(hx2, hy2);
      ctx.closePath();
      ctx.fill();

      // Blade edge highlight
      ctx.strokeStyle = 'rgba(255,255,255,0.25)';
      ctx.lineWidth = 0.6;
      ctx.beginPath();
      ctx.moveTo(hx1, hy1);
      ctx.lineTo(tx1, ty1);
      ctx.stroke();

      // Leading edge darker
      ctx.strokeStyle = 'rgba(0,0,0,0.3)';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(hx2, hy2);
      ctx.lineTo(tx2, ty2);
      ctx.stroke();

      ctx.restore();

      // Draw ghost blades for motion blur at higher speeds
      if (speedRatio > 0.2) {
        const ghosts = Math.floor(speedRatio * 6);
        for (let g = 1; g <= ghosts; g++) {
          const offset = (g / (ghosts + 1)) * 0.3 * speedRatio;
          const ga = angle + offset;
          const ga2 = angle - offset;
          for (const gaOff of [ga, ga2]) {
            const gc = Math.cos(gaOff);
            const gs = Math.sin(gaOff);
            const gtx = hubX + gc * bladeLen;
            const gty = hubY + gs * discHeight;
            const ghostAlpha = (0.15 - speedRatio * 0.05) * (1 - g / (ghosts + 1));

            ctx.save();
            ctx.globalAlpha = ghostAlpha;
            ctx.strokeStyle = '#999';
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.moveTo(hubX, hubY);
            ctx.lineTo(gtx, gty);
            ctx.stroke();
            ctx.restore();
          }
        }
      }
    }

    // Hub center highlight
    ctx.fillStyle = '#ccc';
    ctx.beginPath();
    ctx.arc(hubX, hubY, 3, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  function drawTailRotor(ctx) {
    ctx.save();
    const hubX = -170;
    const hubY = -2;
    const bladeLen = 20;
    const discRadius = 6;
    const numBlades = 4;

    // Motion blur disc
    const discGrad = ctx.createRadialGradient(hubX, hubY, 2, hubX, hubY, bladeLen);
    discGrad.addColorStop(0, 'rgba(180,180,190,0.6)');
    discGrad.addColorStop(0.5, 'rgba(180,180,190,0.35)');
    discGrad.addColorStop(1, 'rgba(180,180,190,0)');
    ctx.fillStyle = discGrad;
    ctx.beginPath();
    ctx.arc(hubX, hubY, bladeLen, 0, Math.PI * 2);
    ctx.fill();

    // Blades
    for (let i = 0; i < numBlades; i++) {
      const angle = S.tailRotorAngle + (i * Math.PI * 2) / numBlades;
      const tx = hubX + Math.cos(angle) * bladeLen;
      const ty = hubY + Math.sin(angle) * bladeLen;

      ctx.strokeStyle = '#555';
      ctx.lineWidth = 2;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(hubX, hubY);
      ctx.lineTo(tx, ty);
      ctx.stroke();

      ctx.strokeStyle = 'rgba(255,255,255,0.2)';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(hubX, hubY);
      ctx.lineTo(tx, ty);
      ctx.stroke();
    }

    // Hub
    ctx.fillStyle = '#666';
    ctx.beginPath();
    ctx.arc(hubX, hubY, 3.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#999';
    ctx.beginPath();
    ctx.arc(hubX, hubY, 2, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  // ── Drawing: Exhaust heat shimmer ─────────────────────
  function drawExhaustHeat(ctx) {
    const speedRatio = clamp(S.rotorSpeed / T.FULL_SPEED, 0, 1);
    if (speedRatio < 0.4) return;
    const alpha = (speedRatio - 0.4) * 0.3;

    const ex = -35;
    const ey = -34;

    for (let i = 0; i < 3; i++) {
      const ox = ex + (Math.sin(S.time * 15 + i * 2.5) * 8);
      const oy = ey - 8 - i * 6;
      ctx.fillStyle = `rgba(200,200,210,${alpha * (0.5 - i * 0.12)})`;
      ctx.beginPath();
      ctx.arc(ox, oy, 5 + i * 3, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // ── Drawing: Landing pad marker ───────────────────────
  function drawLandingPad(ctx) {
    const px = cx;
    const py = groundY;

    // Faded circle marking
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 1;
    ctx.setLineDash([8, 20]);
    ctx.beginPath();
    ctx.arc(px, py, 65, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);

    // H marking
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.lineWidth = 2;
    const hs = 18;
    ctx.beginPath();
    ctx.moveTo(px - hs, py - hs);
    ctx.lineTo(px - hs, py + hs);
    ctx.moveTo(px + hs, py - hs);
    ctx.lineTo(px + hs, py + hs);
    ctx.moveTo(px - hs, py);
    ctx.lineTo(px + hs, py);
    ctx.stroke();
  }

  // ── Update logic ──────────────────────────────────────
  function update(dt) {
    // Clamp dt to avoid huge jumps
    const dtc = Math.min(dt, 0.1);
    S.time += dtc;

    // ── Phase: idle → spinup ──
    if (S.time < T.SPINUP_START) {
      S.targetRotorSpeed = T.IDLE_SPEED;
      S.phase = 'idle';
    } else if (S.time < T.SPINUP_END) {
      const raw = (S.time - T.SPINUP_START) / (T.SPINUP_END - T.SPINUP_START);
      const t = easeInOutCubic(clamp(raw, 0, 1));
      S.targetRotorSpeed = T.IDLE_SPEED + (T.FULL_SPEED - T.IDLE_SPEED) * t;
      S.phase = 'spinup';
    } else {
      S.targetRotorSpeed = T.FULL_SPEED;
      S.phase = 'full';
    }

    // Smooth rotor speed approach
    const speedApproach = S.targetRotorSpeed > S.rotorSpeed ? 3.5 : 2.0;
    S.rotorSpeed += (S.targetRotorSpeed - S.rotorSpeed) * Math.min(dtc * speedApproach, 1);

    // Update rotor angles
    S.rotorAngle += S.rotorSpeed * dtc;
    S.tailRotorAngle += S.tailRotorSpeed * dtc;

    // ── Phase: shake ──
    if (S.time >= T.SHAKE_START && S.time < T.LIFTOFF_START) {
      const t = clamp((S.time - T.SHAKE_START) / 1.0, 0, 1);
      S.shakeIntensity = t * clamp(S.rotorSpeed / T.FULL_SPEED, 0, 1);
    } else if (S.time >= T.LIFTOFF_START) {
      const t = clamp((S.time - T.LIFTOFF_START) / 1.5, 0, 1);
      S.shakeIntensity = (1 - t) * clamp(S.rotorSpeed / T.FULL_SPEED, 0, 1);
    } else {
      S.shakeIntensity = 0;
    }

    // Apply shake
    const shakeAmp = S.shakeIntensity * 4.5;
    S.shakeX = (Math.sin(S.time * 47.3) * 0.7 + Math.sin(S.time * 73.1) * 0.4 + Math.sin(S.time * 113.7) * 0.3) * shakeAmp;
    S.shakeY = (Math.sin(S.time * 53.7) * 0.6 + Math.sin(S.time * 67.3) * 0.5 + Math.sin(S.time * 97.1) * 0.3) * shakeAmp * 0.7;

    // ── Phase: liftoff ──
    if (S.time >= T.LIFTOFF_START) {
      const raw = (S.time - T.LIFTOFF_START) / T.LIFTOFF_DURATION;
      const t = easeOutCubic(clamp(raw, 0, 1));
      S.altitude = t * 420; // max rise 420px

      if (raw > 1) {
        S.phase = 'climbing';
        // Continue rising slowly
        S.altitude = 420 + (raw - 1) * 80;
      } else {
        S.phase = 'liftoff';
      }
    }

    // ── Particles ──
    spawnParticles(dtc);
    updateParticles(dtc);
  }

  // ── Main draw ─────────────────────────────────────────
  function drawScene() {
    ctx.clearRect(0, 0, W, H);
    drawBackground(ctx);

    const hx = cx + S.shakeX;
    const hy = groundY - 44 - S.altitude + S.shakeY;

    // Draw ground shadow and landing pad in screen space (before translate)
    drawGroundShadow(ctx, hx);
    drawLandingPad(ctx);

    ctx.save();
    ctx.translate(hx, hy);

    // Draw order: tail → skids → body → rotors → effects
    drawTailBoom(ctx);
    drawTailFin(ctx);
    drawTailRotor(ctx);
    drawLandingSkids(ctx);
    drawFuselage(ctx);
    drawCockpit(ctx);
    drawEngineIntake(ctx);
    drawExhaustHeat(ctx);
    drawMainRotorMast(ctx);
    drawMainRotor(ctx);

    ctx.restore();

    drawParticles(ctx);
  }

  // ── Animation loop ────────────────────────────────────
  let lastTime = performance.now();

  function loop(now) {
    const dt = (now - lastTime) / 1000;
    lastTime = now;

    update(dt);
    drawScene();

    requestAnimationFrame(loop);
  }

  // ── Start ─────────────────────────────────────────────
  // Small initial delay so the user sees the helicopter on the ground
  S.time = 0;
  S.rotorSpeed = T.IDLE_SPEED;
  requestAnimationFrame(loop);

  // Click to restart
  canvas.addEventListener('click', () => {
    S.time = 0;
    S.rotorAngle = 0;
    S.rotorSpeed = T.IDLE_SPEED;
    S.targetRotorSpeed = T.IDLE_SPEED;
    S.tailRotorAngle = 0;
    S.altitude = 0;
    S.verticalSpeed = 0;
    S.shakeX = 0;
    S.shakeY = 0;
    S.shakeIntensity = 0;
    S.particles = [];
    S.phase = 'idle';
    lastTime = performance.now();
  });

})();
</script>
</body>
</html>
