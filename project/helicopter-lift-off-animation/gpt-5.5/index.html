<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Helicopter Rotor Start & Lift Off</title>
<style>
  :root {
    --panel: rgba(12, 18, 26, 0.72);
    --text: #dfe8f5;
    --muted: #91a2b7;
  }

  * {
    box-sizing: border-box;
  }

  html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    background:
      radial-gradient(circle at 50% 20%, #c7ddf0 0%, #96b6cf 34%, #6d8fa8 58%, #425b6c 100%);
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
  }

  .hud {
    position: fixed;
    left: 22px;
    bottom: 20px;
    color: var(--text);
    background: var(--panel);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    padding: 14px 16px;
    backdrop-filter: blur(10px);
    box-shadow: 0 16px 40px rgba(0,0,0,0.22);
    user-select: none;
  }

  .hud strong {
    display: block;
    letter-spacing: .04em;
    font-size: 13px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .bar {
    width: 220px;
    height: 8px;
    overflow: hidden;
    border-radius: 999px;
    background: rgba(255,255,255,0.16);
    margin-bottom: 8px;
  }

  .fill {
    width: 0%;
    height: 100%;
    border-radius: inherit;
    background: linear-gradient(90deg, #85d7ff, #ffffff);
    box-shadow: 0 0 16px rgba(160, 225, 255, .65);
  }

  .hint {
    color: var(--muted);
    font-size: 12px;
  }

  .vignette {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(circle at 50% 52%, transparent 0 58%, rgba(4,8,13,.28) 100%);
    mix-blend-mode: multiply;
  }
</style>
</head>
<body>
<canvas id="scene"></canvas>

<div class="hud">
  <strong>Rotor spool-up sequence</strong>
  <div class="bar"><div class="fill" id="fill"></div></div>
  <div class="hint" id="status">Main rotor beginning to turn...</div>
</div>
<div class="vignette"></div>

<script>
(() => {
  const canvas = document.getElementById("scene");
  const ctx = canvas.getContext("2d", { alpha: false });
  const fill = document.getElementById("fill");
  const status = document.getElementById("status");

  let W = 0, H = 0, DPR = 1;
  let groundY = 0;
  let particles = [];
  const startTime = performance.now();

  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = Math.floor(innerWidth);
    H = Math.floor(innerHeight);
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width = W + "px";
    canvas.style.height = H + "px";
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    groundY = H * 0.72;
  }

  window.addEventListener("resize", resize);
  resize();

  function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
  function smoothstep(edge0, edge1, x) {
    x = clamp((x - edge0) / (edge1 - edge0), 0, 1);
    return x * x * (3 - 2 * x);
  }
  function easeOutCubic(x) { return 1 - Math.pow(1 - clamp(x, 0, 1), 3); }
  function easeInOutSine(x) { return -(Math.cos(Math.PI * clamp(x,0,1)) - 1) / 2; }

  function roundedRect(ctx, x, y, w, h, r) {
    const rr = Math.min(r, Math.abs(w) / 2, Math.abs(h) / 2);
    ctx.beginPath();
    ctx.moveTo(x + rr, y);
    ctx.arcTo(x + w, y, x + w, y + h, rr);
    ctx.arcTo(x + w, y + h, x, y + h, rr);
    ctx.arcTo(x, y + h, x, y, rr);
    ctx.arcTo(x, y, x + w, y, rr);
    ctx.closePath();
  }

  function addDust(cx, cy, power, dt) {
    const rate = 3 + power * 26;
    const count = Math.floor(rate * dt * 60 / 16.67 + Math.random() * power * 5);
    for (let i = 0; i < count; i++) {
      const side = Math.random() < .5 ? -1 : 1;
      const angle = (Math.random() * .75 + .15) * side;
      const speed = 0.35 + Math.random() * (2.2 + power * 4.2);
      particles.push({
        x: cx + (Math.random() - .5) * (180 + power * 190),
        y: cy + Math.random() * 16 - 8,
        vx: Math.cos(angle) * speed * side + (Math.random() - .5) * 1.2,
        vy: -Math.random() * (0.7 + power * 1.6) - power * .35,
        r: 1 + Math.random() * (2.4 + power * 4.5),
        life: 0,
        max: 70 + Math.random() * 80,
        a: 0.08 + Math.random() * (0.13 + power * 0.18)
      });
    }
    if (particles.length > 900) particles.splice(0, particles.length - 900);
  }

  function drawSky() {
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, "#cfe6f8");
    g.addColorStop(0.46, "#8fb0c8");
    g.addColorStop(1, "#4b6475");
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    ctx.save();
    ctx.globalAlpha = .24;
    ctx.fillStyle = "#fff";
    for (let i = 0; i < 7; i++) {
      const x = (i * 260 + 80) % (W + 220) - 100;
      const y = H * (.12 + (i % 3) * .07);
      ctx.beginPath();
      ctx.ellipse(x, y, 90, 18, 0, 0, Math.PI * 2);
      ctx.ellipse(x + 55, y + 5, 70, 16, 0, 0, Math.PI * 2);
      ctx.ellipse(x - 55, y + 7, 56, 13, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawGround() {
    const y = groundY;
    const g = ctx.createLinearGradient(0, y - 30, 0, H);
    g.addColorStop(0, "#6e7e5b");
    g.addColorStop(.38, "#516444");
    g.addColorStop(1, "#263428");
    ctx.fillStyle = g;
    ctx.fillRect(0, y, W, H - y);

    ctx.save();
    ctx.globalAlpha = .18;
    ctx.strokeStyle = "#f4edd4";
    ctx.lineWidth = 1;
    for (let i = 0; i < 95; i++) {
      const x = (i * 73) % W;
      const yy = y + 8 + ((i * 47) % Math.max(80, H-y-15));
      ctx.beginPath();
      ctx.moveTo(x, yy);
      ctx.lineTo(x + 12 + (i % 7), yy + 1);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawDust() {
    ctx.save();
    ctx.globalCompositeOperation = "source-over";
    for (const p of particles) {
      const age = p.life / p.max;
      const alpha = p.a * (1 - age) * (age < .08 ? age / .08 : 1);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = "#d8c8a1";
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, p.r * (1 + age * 3.2), p.r * .7, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function updateDust(dt, power) {
    const cx = W * .5;
    const cy = groundY + 5;
    if (power > .12) addDust(cx, cy, power, dt);

    for (const p of particles) {
      p.life += dt * 60;
      p.x += p.vx * dt * 60;
      p.y += p.vy * dt * 60;
      p.vx *= Math.pow(.985, dt * 60);
      p.vy += 0.012 * dt * 60;
      p.r += 0.006 * dt * 60;
    }
    particles = particles.filter(p => p.life < p.max && p.y < H + 50 && p.x > -180 && p.x < W + 180);
  }

  function drawGroundEffects(x, y, rotorPower, lift) {
    ctx.save();

    const shadowW = 230 + rotorPower * 120 - lift * 70;
    const shadowH = 32 + rotorPower * 10 - lift * 10;
    const shadowAlpha = .38 - lift * .16;
    const g = ctx.createRadialGradient(x, groundY + 16, 20, x, groundY + 16, shadowW);
    g.addColorStop(0, `rgba(0,0,0,${shadowAlpha})`);
    g.addColorStop(.55, `rgba(0,0,0,${shadowAlpha * .42})`);
    g.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.ellipse(x, groundY + 16, shadowW, shadowH, 0, 0, Math.PI * 2);
    ctx.fill();

    if (rotorPower > .28) {
      ctx.globalAlpha = .08 + rotorPower * .13;
      ctx.strokeStyle = "#eee5cc";
      ctx.lineWidth = 2;
      for (let i = 0; i < 4; i++) {
        const w = 170 + i * 55 + rotorPower * 130;
        ctx.beginPath();
        ctx.ellipse(x, groundY + 3 + i * 7, w, 9 + i * 5, 0, Math.PI * .08, Math.PI * .92);
        ctx.stroke();
      }
    }
    ctx.restore();
  }

  function drawRotorDisc(x, y, angle, speed01) {
    ctx.save();
    ctx.translate(x, y);

    const blur = smoothstep(.23, .95, speed01);
    const radius = 220;
    const coreRadius = 16;

    if (blur > .02) {
      ctx.save();
      ctx.globalAlpha = .05 + blur * .25;
      const rg = ctx.createRadialGradient(0, 0, 20, 0, 0, radius);
      rg.addColorStop(0, "rgba(255,255,255,.20)");
      rg.addColorStop(.32, "rgba(238,245,250,.26)");
      rg.addColorStop(.78, "rgba(238,245,250,.11)");
      rg.addColorStop(1, "rgba(238,245,250,0)");
      ctx.fillStyle = rg;
      ctx.beginPath();
      ctx.ellipse(0, 0, radius, 30 + blur * 26, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.globalAlpha = .12 + blur * .16;
      ctx.strokeStyle = "rgba(255,255,255,.55)";
      ctx.lineWidth = 1.5;
      for (let i = 0; i < 5; i++) {
        ctx.beginPath();
        ctx.ellipse(0, 0, radius - i * 28, 18 + i * 4 + blur * 20, 0, 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.restore();
    }

    const bladeCount = blur > .65 ? 18 : 4;
    for (let i = 0; i < bladeCount; i++) {
      const a = angle + i * (Math.PI * 2 / bladeCount);
      ctx.save();
      ctx.rotate(a);
      ctx.globalAlpha = bladeCount > 4 ? 0.045 + blur * .025 : 0.88;
      const bladeGradient = ctx.createLinearGradient(20, 0, radius, 0);
      bladeGradient.addColorStop(0, "#1b2731");
      bladeGradient.addColorStop(.5, "#73899b");
      bladeGradient.addColorStop(1, "#d8e2e8");
      ctx.fillStyle = bladeGradient;
      ctx.beginPath();
      ctx.moveTo(coreRadius, -5);
      ctx.quadraticCurveTo(radius * .58, -13, radius, -5);
      ctx.quadraticCurveTo(radius * .96, 3, radius * .48, 7);
      ctx.lineTo(coreRadius, 5);
      ctx.closePath();
      ctx.fill();

      ctx.globalAlpha *= .38;
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(radius * .72, -2.4, radius * .18, 2.1);
      ctx.restore();
    }

    ctx.globalAlpha = .94;
    ctx.fillStyle = "#1c2730";
    ctx.beginPath();
    ctx.arc(0, 0, 16, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "#7f94a3";
    ctx.beginPath();
    ctx.arc(0, 0, 8, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  function drawTailRotor(x, y, angle, speed01) {
    ctx.save();
    ctx.translate(x, y);

    ctx.globalAlpha = .28 + speed01 * .38;
    ctx.fillStyle = "rgba(230,240,245,.32)";
    ctx.beginPath();
    ctx.ellipse(0, 0, 33, 33, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.globalAlpha = .9;
    for (let i = 0; i < 4; i++) {
      ctx.save();
      ctx.rotate(angle + i * Math.PI / 2);
      const g = ctx.createLinearGradient(0, 0, 30, 0);
      g.addColorStop(0, "#172129");
      g.addColorStop(.65, "#b7c8d2");
      g.addColorStop(1, "#ffffff");
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.moveTo(0, -3);
      ctx.lineTo(30, -5);
      ctx.lineTo(32, 4);
      ctx.lineTo(0, 3);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    ctx.fillStyle = "#25323b";
    ctx.beginPath();
    ctx.arc(0, 0, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawHelicopter(x, y, t, rotorAngle, mainSpeed01, tailAngle, lift01) {
    const shakePower = smoothstep(.72, 1, mainSpeed01) * (1 - smoothstep(.18, .7, lift01));
    const shakeX = Math.sin(t * 47) * 2.2 * shakePower + Math.sin(t * 91) * .55 * shakePower;
    const shakeY = Math.cos(t * 61) * 1.7 * shakePower;

    ctx.save();
    ctx.translate(x + shakeX, y + shakeY);

    // Tail boom shadow/back shape
    ctx.save();
    ctx.fillStyle = "#31414d";
    ctx.strokeStyle = "#1a242c";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(72, -28);
    ctx.lineTo(248, -54);
    ctx.lineTo(254, -38);
    ctx.lineTo(78, -8);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Tail fin
    ctx.fillStyle = "#26343f";
    ctx.beginPath();
    ctx.moveTo(236, -61);
    ctx.lineTo(278, -93);
    ctx.lineTo(265, -38);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(242, -31);
    ctx.lineTo(278, -5);
    ctx.lineTo(252, -44);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    ctx.restore();

    drawTailRotor(282, -58, tailAngle, mainSpeed01);

    // Skids
    ctx.save();
    ctx.strokeStyle = "#202a31";
    ctx.lineWidth = 7;
    ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(-108, 61);
    ctx.lineTo(110, 61);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(-78, 32);
    ctx.lineTo(-95, 61);
    ctx.moveTo(63, 35);
    ctx.lineTo(88, 61);
    ctx.stroke();

    ctx.strokeStyle = "#6e7f89";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-103, 58);
    ctx.lineTo(105, 58);
    ctx.stroke();
    ctx.restore();

    // Body main fuselage
    ctx.save();
    const bodyGrad = ctx.createLinearGradient(-130, -65, 120, 48);
    bodyGrad.addColorStop(0, "#dbe6ed");
    bodyGrad.addColorStop(.2, "#9fb1bf");
    bodyGrad.addColorStop(.45, "#536b7d");
    bodyGrad.addColorStop(.7, "#304253");
    bodyGrad.addColorStop(1, "#17232d");
    ctx.fillStyle = bodyGrad;
    ctx.strokeStyle = "#18242d";
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(-142, -2);
    ctx.bezierCurveTo(-126, -60, -55, -87, 40, -72);
    ctx.bezierCurveTo(95, -64, 128, -28, 132, 4);
    ctx.bezierCurveTo(136, 38, 81, 50, 3, 49);
    ctx.bezierCurveTo(-70, 48, -128, 36, -142, -2);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Lower dark belly
    ctx.fillStyle = "rgba(10,18,24,.42)";
    ctx.beginPath();
    ctx.moveTo(-116, 18);
    ctx.bezierCurveTo(-60, 38, 30, 42, 108, 20);
    ctx.bezierCurveTo(89, 48, -74, 57, -116, 18);
    ctx.fill();

    // Nose highlight
    ctx.globalAlpha = .42;
    ctx.fillStyle = "#ffffff";
    ctx.beginPath();
    ctx.ellipse(-62, -54, 54, 12, -0.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    // Cockpit windows
    const winGrad = ctx.createLinearGradient(-118, -66, 30, -18);
    winGrad.addColorStop(0, "#152434");
    winGrad.addColorStop(.55, "#557e9a");
    winGrad.addColorStop(1, "#b9d7e7");
    ctx.fillStyle = winGrad;
    ctx.strokeStyle = "rgba(8,14,19,.8)";
    ctx.lineWidth = 3;

    ctx.beginPath();
    ctx.moveTo(-112, -30);
    ctx.bezierCurveTo(-97, -62, -55, -69, -23, -60);
    ctx.lineTo(-41, -19);
    ctx.bezierCurveTo(-70, -16, -94, -20, -112, -30);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    roundedRect(ctx, -25, -58, 45, 36, 8);
    ctx.fill();
    ctx.stroke();

    roundedRect(ctx, 27, -52, 42, 31, 8);
    ctx.fill();
    ctx.stroke();

    // Door seam and rivets
    ctx.strokeStyle = "rgba(255,255,255,.2)";
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(24, -14);
    ctx.lineTo(24, 39);
    ctx.moveTo(72, -12);
    ctx.lineTo(72, 35);
    ctx.stroke();

    ctx.fillStyle = "rgba(255,255,255,.35)";
    for (let i = 0; i < 12; i++) {
      ctx.beginPath();
      ctx.arc(-70 + i * 15, 31 + Math.sin(i) * 2, 1.35, 0, Math.PI * 2);
      ctx.fill();
    }

    // Engine housing
    const engineGrad = ctx.createLinearGradient(-30, -92, 70, -50);
    engineGrad.addColorStop(0, "#f3f6f7");
    engineGrad.addColorStop(.5, "#7e929f");
    engineGrad.addColorStop(1, "#263743");
    ctx.fillStyle = engineGrad;
    roundedRect(ctx, -34, -86, 94, 31, 14);
    ctx.fill();
    ctx.strokeStyle = "#18242d";
    ctx.lineWidth = 3;
    ctx.stroke();

    // Rotor mast
    ctx.fillStyle = "#172129";
    roundedRect(ctx, 5, -115, 16, 39, 5);
    ctx.fill();
    ctx.strokeStyle = "#3d5360";
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.restore();

    drawRotorDisc(13, -118, rotorAngle, mainSpeed01);

    ctx.restore();
  }

  function frame(now) {
    const time = (now - startTime) / 1000;
    const dt = Math.min(0.033, (now - (frame.last || now)) / 1000 || 0.016);
    frame.last = now;

    // Timeline:
    // 0-2s: slow rotor
    // 2-7s: acceleration and blur
    // 7-8.7s: full speed, shake
    // 8.7s+: vertical lift-off
    const spool = smoothstep(0.7, 7.0, time);
    const full = smoothstep(6.4, 8.0, time);
    const lift = easeOutCubic(smoothstep(8.25, 12.0, time));

    const mainSpeed01 = clamp(0.07 + spool * .93, 0, 1);
    const rotorAngle =
      time * (1.4 + spool * 28 + full * 20) +
      Math.sin(time * 1.7) * .08;

    const tailAngle = time * 42;
    const baseX = W * .5;
    const baseY = groundY - 67;
    const liftHeight = lift * Math.min(255, H * .32);
    const heliY = baseY - liftHeight;

    updateDust(dt, mainSpeed01);

    drawSky();
    drawGround();
    drawGroundEffects(baseX, baseY + 63, mainSpeed01, lift);
    drawDust();

    // Light exhaust heat haze suggestion behind engine/tail
    ctx.save();
    ctx.globalAlpha = .03 + full * .05;
    ctx.strokeStyle = "#fff";
    ctx.lineWidth = 1;
    for (let i = 0; i < 12; i++) {
      const off = Math.sin(time * 4 + i) * 4;
      ctx.beginPath();
      ctx.moveTo(baseX + 100 + i * 14, heliY - 36 + off);
      ctx.bezierCurveTo(baseX + 135 + i * 12, heliY - 48 - off, baseX + 174 + i * 11, heliY - 26 + off, baseX + 210 + i * 11, heliY - 42);
      ctx.stroke();
    }
    ctx.restore();

    drawHelicopter(baseX, heliY, time, rotorAngle, mainSpeed01, tailAngle, lift);

    const percent = Math.round(mainSpeed01 * 100);
    fill.style.width = percent + "%";
    if (time < 2.1) status.textContent = "Main rotor beginning to turn...";
    else if (time < 6.8) status.textContent = "Rotor accelerating — blur and dust increasing.";
    else if (time < 8.4) status.textContent = "Full rotor speed — airframe shaking lightly.";
    else if (lift < .98) status.textContent = "Lift-off: vertical climb initiated.";
    else status.textContent = "Stable vertical ascent.";

    requestAnimationFrame(frame);
  }

  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
