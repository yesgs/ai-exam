<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>俄罗斯方块超解压循环动画</title>
  <style>
    :root {
      --bg1: #07111f;
      --bg2: #111c32;
      --panel: rgba(255, 255, 255, 0.08);
      --line: rgba(155, 205, 255, 0.14);
      --text: rgba(245, 250, 255, 0.92);
      --muted: rgba(215, 230, 255, 0.62);
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 12%, rgba(59, 130, 246, 0.24), transparent 35%),
        radial-gradient(circle at 76% 20%, rgba(236, 72, 153, 0.16), transparent 34%),
        radial-gradient(circle at 52% 92%, rgba(45, 212, 191, 0.17), transparent 36%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 38px 38px;
      mask-image: radial-gradient(circle at center, #000 0%, transparent 78%);
    }

    .app {
      width: min(96vw, 520px);
      height: min(94vh, 820px);
      margin: 3vh auto;
      position: relative;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 28px;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.045));
      box-shadow:
        0 30px 80px rgba(0,0,0,0.38),
        inset 0 1px 0 rgba(255,255,255,0.18);
      backdrop-filter: blur(16px);
    }

    .topbar {
      position: absolute;
      z-index: 3;
      top: 18px;
      left: 20px;
      right: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      pointer-events: none;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .brand b {
      letter-spacing: 0.13em;
      font-size: 13px;
      text-transform: uppercase;
    }

    .brand span {
      color: var(--muted);
      font-size: 12px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(7, 17, 31, 0.52);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.12);
      color: rgba(232, 246, 255, 0.86);
      font-size: 12px;
      white-space: nowrap;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #5eead4;
      box-shadow: 0 0 16px #5eead4;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .hint {
      position: absolute;
      left: 50%;
      bottom: 17px;
      transform: translateX(-50%);
      color: rgba(226, 240, 255, 0.55);
      font-size: 12px;
      letter-spacing: 0.06em;
      pointer-events: none;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <main class="app" id="app">
    <div class="topbar">
      <div class="brand">
        <b>ZEN TETRIS</b>
        <span>fall · lock · glow · clear · loop</span>
      </div>
      <div class="badge"><i class="dot"></i><span id="combo">perfect loop</span></div>
    </div>
    <canvas id="scene"></canvas>
    <div class="hint">每一次都刚刚好 · 自动循环播放</div>
  </main>

  <script>
    const canvas = document.getElementById('scene');
    const ctx = canvas.getContext('2d');
    const app = document.getElementById('app');
    const comboEl = document.getElementById('combo');

    const COLS = 10;
    const ROWS = 20;
    const EMPTY = null;

    const colors = {
      cyan: '#22d3ee',
      blue: '#60a5fa',
      purple: '#a78bfa',
      pink: '#f472b6',
      red: '#fb7185',
      orange: '#fb923c',
      yellow: '#facc15',
      green: '#34d399',
      lime: '#a3e635',
      mint: '#5eead4'
    };

    const shapes = {
      O: [[0, 0], [1, 0], [0, 1], [1, 1]],
      IH: [[0, 0], [1, 0], [2, 0], [3, 0]],
      IV: [[0, 0], [0, 1], [0, 2], [0, 3]],
      T: [[0, 0], [1, 0], [2, 0], [1, 1]],
      L: [[0, 0], [0, 1], [0, 2], [1, 2]],
      J: [[1, 0], [1, 1], [1, 2], [0, 2]],
      S: [[1, 0], [2, 0], [0, 1], [1, 1]],
      Z: [[0, 0], [1, 0], [1, 1], [2, 1]]
    };

    // 两段循环：先五个 O 方块双行消除，再搭出一个完美井，I 方块落下四行消除。
    const sequence = [
      { type: 'O', x: 0, y: 18, color: colors.cyan,   ms: 760, label: 'soft drop' },
      { type: 'O', x: 2, y: 18, color: colors.yellow, ms: 720, label: 'soft drop' },
      { type: 'O', x: 4, y: 18, color: colors.green,  ms: 710, label: 'soft drop' },
      { type: 'O', x: 6, y: 18, color: colors.pink,   ms: 700, label: 'soft drop' },
      { type: 'O', x: 8, y: 18, color: colors.orange, ms: 700, label: 'double clear' },

      { pause: 620, label: 'breathing' },

      { type: 'O', x: 0, y: 16, color: colors.purple, ms: 690, label: 'stacking' },
      { type: 'O', x: 2, y: 16, color: colors.blue,   ms: 680, label: 'stacking' },
      { type: 'O', x: 5, y: 16, color: colors.green,  ms: 690, label: 'stacking' },
      { type: 'O', x: 7, y: 16, color: colors.red,    ms: 670, label: 'stacking' },
      { type: 'IV', x: 9, y: 16, color: colors.cyan,  ms: 780, label: 'well ready' },
      { type: 'O', x: 0, y: 18, color: colors.yellow, ms: 670, label: 'stacking' },
      { type: 'O', x: 2, y: 18, color: colors.lime,   ms: 660, label: 'stacking' },
      { type: 'O', x: 5, y: 18, color: colors.pink,   ms: 680, label: 'stacking' },
      { type: 'O', x: 7, y: 18, color: colors.orange, ms: 660, label: 'perfect gap' },
      { type: 'IV', x: 4, y: 16, color: colors.mint,  ms: 980, label: 'TETRIS!' },

      { pause: 1180, label: 'perfect loop' }
    ];

    let dpr = 1;
    let W = 0;
    let H = 0;
    let cell = 26;
    let boardX = 0;
    let boardY = 0;
    let boardW = 0;
    let boardH = 0;

    let board = makeBoard();
    let active = null;
    let state = 'drop';
    let sequenceIndex = 0;
    let waitUntil = 0;
    let clearState = null;
    let particles = [];
    let ripples = [];
    let scorePulse = null;
    let lastTime = performance.now();
    let totalClears = 0;

    function makeBoard() {
      return Array.from({ length: ROWS }, () => Array.from({ length: COLS }, () => EMPTY));
    }

    function resize() {
      const rect = app.getBoundingClientRect();
      dpr = Math.max(1, Math.min(2.4, window.devicePixelRatio || 1));
      W = rect.width;
      H = rect.height;
      canvas.width = Math.floor(W * dpr);
      canvas.height = Math.floor(H * dpr);
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      cell = Math.floor(Math.min((W - 96) / COLS, (H - 148) / ROWS));
      boardW = cell * COLS;
      boardH = cell * ROWS;
      boardX = (W - boardW) / 2;
      boardY = (H - boardH) / 2 + 26;
    }

    function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
    function lerp(a, b, p) { return a + (b - a) * p; }
    function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
    function easeInOutSine(t) { return -(Math.cos(Math.PI * t) - 1) / 2; }
    function easeOutBack(t) {
      const c1 = 1.70158;
      const c3 = c1 + 1;
      return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
    }

    function hexToRgb(hex) {
      const h = hex.replace('#', '');
      return {
        r: parseInt(h.slice(0, 2), 16),
        g: parseInt(h.slice(2, 4), 16),
        b: parseInt(h.slice(4, 6), 16)
      };
    }

    function rgba(hex, a) {
      const c = hexToRgb(hex);
      return `rgba(${c.r}, ${c.g}, ${c.b}, ${a})`;
    }

    function lighten(hex, amount = 0.35) {
      const c = hexToRgb(hex);
      const r = Math.round(c.r + (255 - c.r) * amount);
      const g = Math.round(c.g + (255 - c.g) * amount);
      const b = Math.round(c.b + (255 - c.b) * amount);
      return `rgb(${r}, ${g}, ${b})`;
    }

    function startNext(now) {
      let item = sequence[sequenceIndex];
      if (!item) {
        sequenceIndex = 0;
        board = makeBoard();
        particles = [];
        ripples = [];
        item = sequence[sequenceIndex];
      }

      if (item.pause) {
        comboEl.textContent = item.label || 'perfect loop';
        state = 'wait';
        waitUntil = now + item.pause;
        sequenceIndex++;
        return;
      }

      const shape = shapes[item.type];
      const width = Math.max(...shape.map(p => p[0])) + 1;
      const spawnX = clamp(4 - Math.floor(width / 2), 0, COLS - width);

      active = {
        ...item,
        shape,
        spawnX,
        spawnY: -4,
        start: now,
        duration: item.ms || 760,
        landedAt: 0
      };
      comboEl.textContent = item.label || 'falling';
      state = 'drop';
      sequenceIndex++;
    }

    function getActivePosition(now) {
      if (!active) return { x: 0, y: 0, p: 1 };
      const p = clamp((now - active.start) / active.duration, 0, 1);
      const soft = easeInOutSine(p);
      const settle = p > 0.9 ? 1 + Math.sin((p - 0.9) / 0.1 * Math.PI) * 0.015 : 1;
      return {
        x: lerp(active.spawnX, active.x, easeOutCubic(p)),
        y: lerp(active.spawnY, active.y, soft) * settle,
        p
      };
    }

    function landActive(now) {
      if (!active) return;
      for (const [dx, dy] of active.shape) {
        const x = active.x + dx;
        const y = active.y + dy;
        if (y >= 0 && y < ROWS && x >= 0 && x < COLS) {
          board[y][x] = { color: active.color, born: now, pop: true };
          burstAtCell(x + 0.5, y + 0.5, active.color, 4, 0.55);
        }
      }
      ripples.push({ x: active.x + 1, y: active.y + 1, start: now, color: active.color });
      active = null;

      const full = findFullRows();
      if (full.length) {
        startClear(full, now);
      } else {
        state = 'wait';
        waitUntil = now + 135;
      }
    }

    function findFullRows() {
      const rows = [];
      for (let y = 0; y < ROWS; y++) {
        if (board[y].every(Boolean)) rows.push(y);
      }
      return rows;
    }

    function startClear(rows, now) {
      totalClears += rows.length;
      clearState = { rows, start: now, duration: rows.length >= 4 ? 1180 : 920 };
      state = 'clear';

      const text = rows.length >= 4 ? 'TETRIS! PERFECT CLEAR' : rows.length === 2 ? 'DOUBLE LINE CLEAR' : 'LINE CLEAR';
      comboEl.textContent = text.toLowerCase();
      scorePulse = { text, start: now, duration: 1150, rows: rows.length };

      for (const y of rows) {
        for (let x = 0; x < COLS; x++) {
          const c = board[y][x]?.color || colors.mint;
          burstAtCell(x + 0.5, y + 0.5, c, rows.length >= 4 ? 10 : 7, rows.length >= 4 ? 1.2 : 0.95);
        }
      }
    }

    function finishClear() {
      if (!clearState) return;
      const clearSet = new Set(clearState.rows);
      const kept = [];
      for (let y = 0; y < ROWS; y++) {
        if (!clearSet.has(y)) kept.push(board[y]);
      }
      const emptyRows = Array.from({ length: ROWS - kept.length }, () => Array.from({ length: COLS }, () => EMPTY));
      board = [...emptyRows, ...kept];
      clearState = null;
      state = 'wait';

      const finishedWholeSequence = sequenceIndex >= sequence.length;
      waitUntil = performance.now() + (finishedWholeSequence ? 780 : 420);
      if (finishedWholeSequence) {
        setTimeout(() => {
          if (state === 'wait' && sequenceIndex >= sequence.length) {
            board = makeBoard();
          }
        }, 360);
      }
    }

    function burstAtCell(cx, cy, color, count, power) {
      const px = boardX + cx * cell;
      const py = boardY + cy * cell;
      for (let i = 0; i < count; i++) {
        const a = Math.random() * Math.PI * 2;
        const speed = (0.6 + Math.random() * 1.65) * power;
        particles.push({
          x: px,
          y: py,
          vx: Math.cos(a) * speed,
          vy: Math.sin(a) * speed - 0.45 * power,
          life: 0,
          max: 420 + Math.random() * 580,
          size: 1.4 + Math.random() * 3.5,
          color
        });
      }
    }

    function update(now) {
      const dt = Math.min(33, now - lastTime);
      lastTime = now;

      if (state === 'drop' && active) {
        const { p } = getActivePosition(now);
        if (p >= 1) landActive(now);
      } else if (state === 'wait') {
        if (now >= waitUntil) startNext(now);
      } else if (state === 'clear' && clearState) {
        if (now - clearState.start >= clearState.duration) finishClear();
      }

      particles = particles.filter(pt => {
        pt.life += dt;
        pt.x += pt.vx * dt / 16.67;
        pt.y += pt.vy * dt / 16.67;
        pt.vy += 0.032 * dt / 16.67;
        pt.vx *= 0.992;
        pt.vy *= 0.992;
        return pt.life < pt.max;
      });

      ripples = ripples.filter(r => now - r.start < 700);
    }

    function roundedRect(x, y, w, h, r) {
      const rr = Math.min(r, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + rr, y);
      ctx.arcTo(x + w, y, x + w, y + h, rr);
      ctx.arcTo(x + w, y + h, x, y + h, rr);
      ctx.arcTo(x, y + h, x, y, rr);
      ctx.arcTo(x, y, x + w, y, rr);
      ctx.closePath();
    }

    function drawBackground(now) {
      ctx.clearRect(0, 0, W, H);

      const pulse = 0.5 + 0.5 * Math.sin(now / 1600);
      const g = ctx.createRadialGradient(W * 0.5, H * 0.45, 40, W * 0.5, H * 0.45, Math.max(W, H) * 0.72);
      g.addColorStop(0, `rgba(83, 125, 255, ${0.16 + pulse * 0.04})`);
      g.addColorStop(0.48, 'rgba(15, 23, 42, 0.15)');
      g.addColorStop(1, 'rgba(1, 5, 14, 0.28)');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);

      // 轻微星尘，不随机跳动，避免刺眼。
      ctx.save();
      ctx.globalAlpha = 0.35;
      for (let i = 0; i < 45; i++) {
        const x = (i * 73 + 19) % Math.floor(W || 1);
        const y = (i * 131 + now * 0.012) % Math.floor(H || 1);
        ctx.fillStyle = i % 3 === 0 ? 'rgba(94, 234, 212, 0.35)' : 'rgba(255,255,255,0.22)';
        ctx.fillRect(x, y, 1.2, 1.2);
      }
      ctx.restore();
    }

    function drawBoardPanel(now) {
      ctx.save();
      ctx.shadowColor = 'rgba(34, 211, 238, 0.18)';
      ctx.shadowBlur = 38;
      roundedRect(boardX - 14, boardY - 14, boardW + 28, boardH + 28, 22);
      ctx.fillStyle = 'rgba(2, 8, 23, 0.58)';
      ctx.fill();
      ctx.restore();

      roundedRect(boardX - 8, boardY - 8, boardW + 16, boardH + 16, 18);
      const panelGrad = ctx.createLinearGradient(boardX, boardY, boardX, boardY + boardH);
      panelGrad.addColorStop(0, 'rgba(255,255,255,0.09)');
      panelGrad.addColorStop(1, 'rgba(255,255,255,0.025)');
      ctx.fillStyle = panelGrad;
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.16)';
      ctx.lineWidth = 1;
      ctx.stroke();

      ctx.save();
      ctx.beginPath();
      roundedRect(boardX, boardY, boardW, boardH, 13);
      ctx.clip();
      ctx.fillStyle = 'rgba(1, 9, 21, 0.42)';
      ctx.fillRect(boardX, boardY, boardW, boardH);

      ctx.strokeStyle = 'rgba(160, 210, 255, 0.09)';
      ctx.lineWidth = 1;
      for (let x = 0; x <= COLS; x++) {
        const px = boardX + x * cell;
        ctx.beginPath();
        ctx.moveTo(px, boardY);
        ctx.lineTo(px, boardY + boardH);
        ctx.stroke();
      }
      for (let y = 0; y <= ROWS; y++) {
        const py = boardY + y * cell;
        ctx.beginPath();
        ctx.moveTo(boardX, py);
        ctx.lineTo(boardX + boardW, py);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawBlock(gx, gy, color, alpha = 1, scale = 1, glow = 1) {
      const pad = Math.max(2, cell * 0.075);
      const size = cell - pad * 2;
      const cx = boardX + gx * cell + cell / 2;
      const cy = boardY + gy * cell + cell / 2;
      const w = size * scale;
      const h = size * scale;
      const x = cx - w / 2;
      const y = cy - h / 2;
      const r = Math.max(5, cell * 0.16);

      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.shadowColor = rgba(color, 0.55 * glow);
      ctx.shadowBlur = 14 * glow;
      roundedRect(x, y, w, h, r);
      const grad = ctx.createLinearGradient(x, y, x + w, y + h);
      grad.addColorStop(0, lighten(color, 0.55));
      grad.addColorStop(0.46, color);
      grad.addColorStop(1, rgba(color, 0.72));
      ctx.fillStyle = grad;
      ctx.fill();
      ctx.lineWidth = 1;
      ctx.strokeStyle = 'rgba(255,255,255,0.38)';
      ctx.stroke();

      roundedRect(x + w * 0.16, y + h * 0.13, w * 0.58, h * 0.13, r * 0.65);
      ctx.fillStyle = 'rgba(255,255,255,0.22)';
      ctx.fill();
      ctx.restore();
    }

    function isClearingRow(row) {
      return clearState && clearState.rows.includes(row);
    }

    function drawSettled(now) {
      for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
          const cellData = board[y][x];
          if (!cellData) continue;

          let alpha = 1;
          let scale = 1;
          let glow = 0.82;

          const age = now - cellData.born;
          if (age < 220) {
            const p = easeOutBack(clamp(age / 220, 0, 1));
            scale = lerp(0.68, 1, p);
            glow = 1.2;
          }

          if (isClearingRow(y)) {
            const cp = clamp((now - clearState.start) / clearState.duration, 0, 1);
            alpha = 1 - Math.pow(cp, 2.4) * 0.72;
            scale = 1 + Math.sin(cp * Math.PI) * 0.08;
            glow = 1.9 + Math.sin(cp * Math.PI * 6) * 0.38;
          }

          drawBlock(x, y, cellData.color, alpha, scale, glow);
        }
      }
    }

    function drawGhostAndActive(now) {
      if (!active) return;
      const pos = getActivePosition(now);
      const p = pos.p;

      // 目标位置幽灵，增强“刚刚好”的解压感。
      ctx.save();
      ctx.globalAlpha = 0.16 + 0.06 * Math.sin(now / 180);
      for (const [dx, dy] of active.shape) {
        drawBlock(active.x + dx, active.y + dy, active.color, 0.18, 0.92, 0.35);
      }
      ctx.restore();

      // 下落拖影。
      for (let t = 4; t >= 1; t--) {
        const offset = t * (0.08 + p * 0.10);
        const a = 0.055 * (5 - t);
        for (const [dx, dy] of active.shape) {
          drawBlock(pos.x + dx, pos.y + dy - offset, active.color, a, 0.98, 0.4);
        }
      }

      const landing = p > 0.88 ? Math.sin((p - 0.88) / 0.12 * Math.PI) * 0.055 : 0;
      const scale = 1 + landing;
      for (const [dx, dy] of active.shape) {
        drawBlock(pos.x + dx, pos.y + dy, active.color, 1, scale, 1.2);
      }
    }

    function drawClearEffects(now) {
      if (!clearState) return;
      const p = clamp((now - clearState.start) / clearState.duration, 0, 1);
      const wipe = easeOutCubic(p);

      ctx.save();
      ctx.beginPath();
      roundedRect(boardX, boardY, boardW, boardH, 13);
      ctx.clip();

      for (const row of clearState.rows) {
        const y = boardY + row * cell;
        const h = cell;
        const centerX = boardX + boardW * wipe;

        const grad = ctx.createLinearGradient(centerX - cell * 2.4, 0, centerX + cell * 2.4, 0);
        grad.addColorStop(0, 'rgba(255,255,255,0)');
        grad.addColorStop(0.46, 'rgba(255,255,255,0.08)');
        grad.addColorStop(0.5, 'rgba(255,255,255,0.93)');
        grad.addColorStop(0.54, 'rgba(94,234,212,0.36)');
        grad.addColorStop(1, 'rgba(255,255,255,0)');

        ctx.fillStyle = grad;
        ctx.fillRect(boardX, y - 2, boardW, h + 4);

        ctx.globalAlpha = Math.sin(p * Math.PI) * 0.35;
        ctx.fillStyle = 'rgba(94, 234, 212, 0.72)';
        ctx.fillRect(boardX, y + h / 2 - 1, boardW, 2);
        ctx.globalAlpha = 1;
      }
      ctx.restore();
    }

    function drawRipples(now) {
      for (const r of ripples) {
        const p = clamp((now - r.start) / 700, 0, 1);
        const cx = boardX + r.x * cell;
        const cy = boardY + r.y * cell;
        ctx.save();
        ctx.globalAlpha = (1 - p) * 0.35;
        ctx.strokeStyle = rgba(r.color, 0.85);
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(cx, cy, cell * (0.4 + p * 1.7), 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }
    }

    function drawParticles() {
      for (const pt of particles) {
        const p = pt.life / pt.max;
        ctx.save();
        ctx.globalAlpha = (1 - p) * 0.92;
        ctx.fillStyle = pt.color;
        ctx.shadowColor = rgba(pt.color, 0.8);
        ctx.shadowBlur = 12;
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, pt.size * (1 - p * 0.25), 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function drawScorePulse(now) {
      if (!scorePulse) return;
      const p = (now - scorePulse.start) / scorePulse.duration;
      if (p >= 1) {
        scorePulse = null;
        return;
      }

      const rise = easeOutCubic(clamp(p, 0, 1));
      const alpha = p < 0.18 ? p / 0.18 : 1 - clamp((p - 0.58) / 0.42, 0, 1);
      const scale = 0.9 + Math.sin(Math.min(1, p) * Math.PI) * 0.16;
      const text = scorePulse.text;

      ctx.save();
      ctx.translate(W / 2, boardY + boardH * 0.43 - rise * 18);
      ctx.scale(scale, scale);
      ctx.globalAlpha = alpha;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = `800 ${Math.max(22, cell * 0.72)}px Inter, system-ui, sans-serif`;
      ctx.lineWidth = 7;
      ctx.strokeStyle = 'rgba(1, 8, 20, 0.74)';
      ctx.strokeText(text, 0, 0);
      const grad = ctx.createLinearGradient(-boardW / 2, 0, boardW / 2, 0);
      grad.addColorStop(0, '#7dd3fc');
      grad.addColorStop(0.5, '#ffffff');
      grad.addColorStop(1, '#5eead4');
      ctx.fillStyle = grad;
      ctx.shadowColor = 'rgba(94, 234, 212, 0.82)';
      ctx.shadowBlur = 20;
      ctx.fillText(text, 0, 0);
      ctx.restore();
    }

    function drawSideMeters(now) {
      const x1 = boardX - 34;
      const x2 = boardX + boardW + 34;
      const y0 = boardY + boardH * 0.14;
      const h = boardH * 0.72;
      const fill = 0.52 + 0.38 * (0.5 + 0.5 * Math.sin(now / 900));

      ctx.save();
      for (const x of [x1, x2]) {
        roundedRect(x - 5, y0, 10, h, 6);
        ctx.fillStyle = 'rgba(255,255,255,0.055)';
        ctx.fill();
        const mh = h * fill;
        const gy = y0 + h - mh;
        roundedRect(x - 5, gy, 10, mh, 6);
        const g = ctx.createLinearGradient(0, gy, 0, gy + mh);
        g.addColorStop(0, 'rgba(94, 234, 212, 0.95)');
        g.addColorStop(1, 'rgba(96, 165, 250, 0.30)');
        ctx.fillStyle = g;
        ctx.shadowColor = 'rgba(94,234,212,0.46)';
        ctx.shadowBlur = 16;
        ctx.fill();
      }
      ctx.restore();
    }

    function render(now) {
      drawBackground(now);
      drawSideMeters(now);
      drawBoardPanel(now);

      ctx.save();
      ctx.beginPath();
      roundedRect(boardX, boardY, boardW, boardH, 13);
      ctx.clip();
      drawSettled(now);
      drawGhostAndActive(now);
      drawClearEffects(now);
      drawRipples(now);
      drawParticles();
      ctx.restore();

      drawScorePulse(now);

      // 底部柔光阴影。
      ctx.save();
      const shadow = ctx.createRadialGradient(W / 2, boardY + boardH + 10, 10, W / 2, boardY + boardH + 10, boardW * 0.62);
      shadow.addColorStop(0, 'rgba(0, 0, 0, 0.34)');
      shadow.addColorStop(1, 'rgba(0, 0, 0, 0)');
      ctx.fillStyle = shadow;
      ctx.fillRect(boardX - boardW * 0.25, boardY + boardH - 20, boardW * 1.5, 76);
      ctx.restore();
    }

    function loop(now) {
      update(now);
      render(now);
      requestAnimationFrame(loop);
    }

    window.addEventListener('resize', resize);
    resize();
    startNext(performance.now());
    requestAnimationFrame(loop);
  </script>
</body>
</html>
